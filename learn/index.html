<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OPOYO Learning</title>
<meta name="theme-color" content="#FFFFFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="OPOYO">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root { --primary: #000033; --bg: #FFFFFF; --text: #333333; --sub: #AAAAAA; --border: #E5E5E5; }
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter','Noto Sans JP',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
#app { max-width: 500px; margin: 0 auto; padding: 0 20px 110px; }

header { text-align: center; padding: 60px 0 10px; }
header h1 { font-weight: 300; letter-spacing: 0.35em; font-size: 1rem; color: var(--primary); text-transform: uppercase; }
header .tagline { font-size: 0.58rem; color: var(--sub); letter-spacing: 0.25em; margin-top: 10px; text-transform: uppercase; }

.view { display: none; }
.view.active { display: block; animation: fadein .3s ease; }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

.section { padding: 34px 0; border-bottom: 1px solid var(--border); }
.section:last-child { border-bottom: none; }
.section-title { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.25em; color: var(--primary); text-transform: uppercase; margin-bottom: 20px; }
.section-title small { color: var(--sub); font-weight: 400; letter-spacing: 0.15em; margin-left: 10px; }

/* ---- home ---- */
.day-row { display: flex; justify-content: space-between; align-items: baseline; }
.day-num { font-size: 2.2rem; font-weight: 300; color: var(--primary); letter-spacing: 0.05em; }
.day-num small { font-size: 0.8rem; color: var(--sub); font-weight: 300; letter-spacing: 0.1em; }
.streak-num { font-size: 0.7rem; color: var(--primary); letter-spacing: 0.15em; text-align: right; }
.streak-num b { font-size: 1.2rem; font-weight: 400; }
.hairbar { height: 1px; background: var(--border); margin-top: 24px; position: relative; }
.hairbar > div { position: absolute; top: -1px; left: 0; height: 3px; background: var(--primary); transition: width .5s; }
.note { font-size: 0.72rem; color: var(--sub); margin-top: 18px; line-height: 1.9; }
.note b { color: var(--text); font-weight: 400; }

.task-list { border-top: 1px solid var(--border); }
.task-row { display: flex; justify-content: space-between; align-items: center; width: 100%; background: none; border: none; border-bottom: 1px solid var(--border); padding: 20px 2px; cursor: pointer; font-family: inherit; text-align: left; }
.task-row:active { background: #FAFAFA; }
.task-row .nm { font-size: 0.88rem; color: var(--primary); font-weight: 400; letter-spacing: 0.05em; }
.task-row .nm small { display: block; font-size: 0.58rem; color: var(--sub); letter-spacing: 0.15em; margin-top: 5px; }
.task-row .st { font-size: 0.68rem; color: var(--sub); letter-spacing: 0.1em; text-align: right; flex-shrink: 0; line-height: 1.7; }
.task-row .st b { color: var(--primary); font-weight: 400; }
.task-row.donetask .nm { color: var(--sub); text-decoration: line-through; }
.alldone { font-size: 0.72rem; color: var(--primary); letter-spacing: 0.15em; margin-top: 18px; }

.chip-row { display: flex; gap: 20px; flex-wrap: wrap; }
.chip { border: none; background: none; padding: 4px 0; font-size: 0.68rem; cursor: pointer; font-family: inherit; color: var(--sub); letter-spacing: 0.1em; border-bottom: 1px solid transparent; }
.chip.on { color: var(--primary); border-bottom-color: var(--primary); }

.set-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; font-size: 0.78rem; color: var(--text); }
.set-row select { border: none; border-bottom: 1px solid var(--border); padding: 6px 2px; font-family: inherit; background: transparent; font-size: 0.78rem; outline: none; color: var(--primary); border-radius: 0; }

/* ---- study (shared) ---- */
.study-top { display: flex; justify-content: space-between; align-items: center; padding-top: 26px; font-size: 0.65rem; color: var(--sub); letter-spacing: 0.15em; }
.study-top button { background: none; border: none; color: var(--sub); font-size: 0.65rem; cursor: pointer; letter-spacing: 0.15em; font-family: inherit; padding: 4px; }
.qline { height: 1px; background: var(--border); margin-top: 14px; position: relative; }
.qline > div { position: absolute; top: 0; left: 0; height: 1px; background: var(--primary); transition: width .3s; }

.flashcard { padding: 56px 10px 36px; text-align: center; min-height: 290px; display: flex; flex-direction: column; justify-content: center; }
.flashcard .lang-tag { font-size: 0.58rem; color: var(--sub); letter-spacing: 0.3em; text-transform: uppercase; }
.flashcard .catg { font-size: 0.6rem; color: var(--sub); letter-spacing: 0.1em; margin-top: 8px; }
.flashcard .newtag { font-size: 0.55rem; color: var(--primary); letter-spacing: 0.3em; margin-bottom: 14px; }
.flashcard .word { font-size: 1.55rem; font-weight: 300; color: var(--primary); margin: 24px 0 4px; line-height: 1.5; word-break: break-word; letter-spacing: 0.02em; }
.flashcard .word.q { font-size: 1.1rem; font-weight: 400; }
.flashcard .meaning { font-size: 1rem; font-weight: 300; color: var(--text); margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); line-height: 1.8; }
.flashcard .forms { font-size: 0.66rem; color: var(--sub); margin-top: 12px; letter-spacing: 0.04em; font-weight: 300; line-height: 1.8; }
.speak-btn { background: none; border: 1px solid var(--border); border-radius: 50%; width: 42px; height: 42px; font-size: 0.7rem; color: var(--primary); cursor: pointer; margin: 20px auto 0; display: block; font-family: inherit; }

.btn-row { display: flex; gap: 1px; background: var(--border); border: 1px solid var(--border); }
.abtn { flex: 1; border: none; padding: 18px 6px; font-size: 0.75rem; cursor: pointer; font-family: inherit; background: var(--bg); color: var(--text); font-weight: 400; letter-spacing: 0.1em; }
.abtn:active { background: #FAFAFA; }
.abtn small { display: block; font-size: 0.55rem; color: var(--sub); margin-top: 5px; letter-spacing: 0.05em; }
.abtn.show { background: var(--primary); color: white; letter-spacing: 0.25em; padding: 20px; }
.abtn.good { background: var(--primary); color: white; }
.abtn.good small { color: rgba(255,255,255,0.6); }

.choice-btn { display: block; width: 100%; background: var(--bg); border: none; border-bottom: 1px solid var(--border); padding: 17px 4px; font-size: 0.85rem; font-weight: 300; text-align: left; cursor: pointer; font-family: inherit; color: var(--text); line-height: 1.6; }
.choice-btn:first-of-type { border-top: 1px solid var(--border); }
.choice-btn:active { background: #FAFAFA; }
.choice-btn.correct { background: var(--primary); color: white; }
.choice-btn.wrong { color: var(--sub); text-decoration: line-through; }

.done-card { text-align: center; padding: 90px 20px 60px; }
.done-card .ttl { font-size: 0.8rem; letter-spacing: 0.4em; color: var(--primary); text-transform: uppercase; }
.done-card p { font-size: 0.72rem; color: var(--sub); line-height: 2.1; margin-top: 20px; }
.done-card .xp-gain { font-size: 0.7rem; color: var(--primary); letter-spacing: 0.2em; margin-top: 14px; }
.primary-btn { background: var(--primary); color: white; border: none; padding: 20px 50px; font-size: 0.7rem; letter-spacing: 0.3em; cursor: pointer; margin-top: 40px; font-family: inherit; font-weight: 600; }
.ghost-btn { background: none; color: var(--primary); border: 1px solid var(--border); padding: 19px 40px; font-size: 0.7rem; letter-spacing: 0.3em; cursor: pointer; margin-top: 14px; font-family: inherit; font-weight: 400; }

/* ---- grammar / reading ---- */
.lesson-head { padding-top: 40px; }
.lesson-head .lt { font-size: 0.58rem; color: var(--sub); letter-spacing: 0.3em; text-transform: uppercase; }
.lesson-head h3 { font-size: 1.15rem; font-weight: 400; color: var(--primary); margin-top: 14px; line-height: 1.6; }
.lesson-exp { font-size: 0.85rem; line-height: 2.1; color: var(--text); font-weight: 300; margin-top: 24px; }
.example { border-top: 1px solid var(--border); padding: 16px 2px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.example:last-of-type { border-bottom: 1px solid var(--border); }
.example .t { font-size: 0.92rem; color: var(--primary); font-weight: 400; line-height: 1.7; }
.example .j { font-size: 0.7rem; color: var(--sub); margin-top: 4px; font-weight: 300; }
.example .pl { background: none; border: 1px solid var(--border); border-radius: 50%; width: 34px; height: 34px; font-size: 0.55rem; color: var(--primary); cursor: pointer; flex-shrink: 0; font-family: inherit; }
.q-stem { font-size: 1rem; font-weight: 300; color: var(--primary); line-height: 2; padding: 40px 0 24px; text-align: center; }
.q-stem small { display: block; font-size: 0.62rem; color: var(--sub); letter-spacing: 0.2em; margin-bottom: 14px; }
.passage { font-size: 0.98rem; font-weight: 300; color: var(--primary); line-height: 2.3; padding: 30px 0 10px; }
.passage-jp { font-size: 0.78rem; font-weight: 300; color: var(--sub); line-height: 2.1; padding: 20px 0; border-top: 1px solid var(--border); margin-top: 20px; }
.center-row { text-align: center; }

/* ---- words ---- */
.filter-row { display: flex; gap: 20px; flex-wrap: wrap; padding-top: 26px; }
.filter-row.sub { padding-top: 14px; gap: 16px; }
.word-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding: 16px 2px; cursor: pointer; }
.word-item .w { font-weight: 400; font-size: 0.88rem; color: var(--primary); }
.word-item .w .lg { font-size: 0.55rem; color: var(--sub); letter-spacing: 0.2em; margin-right: 8px; }
.word-item .m { font-size: 0.7rem; color: var(--sub); margin-top: 4px; font-weight: 300; }
.word-item .lvl { font-size: 0.7rem; color: var(--primary); flex-shrink: 0; margin-left: 12px; }
.legend { font-size: 0.6rem; color: var(--sub); letter-spacing: 0.05em; padding: 22px 0 4px; }
.add-form input, .add-form select { width: 100%; border: none; border-bottom: 1px solid var(--border); padding: 12px 0; font-size: 0.95rem; margin-top: 14px; font-family: inherit; background: transparent; outline: none; border-radius: 0; font-weight: 300; }
.add-form .primary-btn { width: 100%; margin-top: 30px; }

/* ---- record ---- */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 26px 10px; }
.stat { text-align: center; }
.stat .v { font-size: 1.5rem; font-weight: 300; color: var(--primary); }
.stat .k { font-size: 0.55rem; color: var(--sub); letter-spacing: 0.15em; margin-top: 6px; }
.badge-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 20px; }
.badge { font-size: 0.72rem; color: var(--sub); letter-spacing: 0.05em; font-weight: 300; }
.badge::before { content: '○'; margin-right: 10px; font-size: 0.6rem; }
.badge.got { color: var(--primary); font-weight: 400; }
.badge.got::before { content: '●'; }
.roadmap-item { display: flex; gap: 14px; padding: 13px 0; border-bottom: 1px solid var(--border); font-size: 0.74rem; align-items: baseline; }
.roadmap-item:last-child { border-bottom: none; }
.roadmap-item .mo { color: var(--sub); flex-shrink: 0; width: 48px; font-size: 0.62rem; letter-spacing: 0.05em; }
.roadmap-item .tx b { color: var(--text); font-weight: 400; }
.roadmap-item .tx small { display: block; color: var(--sub); margin-top: 3px; font-weight: 300; }
.roadmap-item.now .mo, .roadmap-item.now .tx b { color: var(--primary); font-weight: 700; }
.heat { display: grid; grid-template-columns: repeat(15, 1fr); gap: 4px; }
.heat span { aspect-ratio: 1; background: #F2F2F2; }
.heat span.part { background: #C7C7D4; }
.heat span.full { background: var(--primary); }
.heat span.future { background: var(--bg); border: 1px solid var(--border); }

/* ---- dialogue ---- */
.dline { border-bottom: 1px solid var(--border); padding: 15px 2px; display: flex; gap: 12px; align-items: flex-start; }
.dline:first-of-type { border-top: 1px solid var(--border); }
.dline .sp { font-size: 0.58rem; color: var(--sub); letter-spacing: 0.15em; width: 18px; padding-top: 5px; flex-shrink: 0; }
.dline.you .sp { color: var(--primary); font-weight: 700; }
.dline .tx { flex: 1; }
.dline .tx .t { font-size: 0.9rem; color: var(--primary); font-weight: 400; line-height: 1.7; }
.dline.you .tx .t { font-weight: 600; }
.dline .tx .j { font-size: 0.68rem; color: var(--sub); margin-top: 4px; font-weight: 300; }
.dline .pl { background: none; border: 1px solid var(--border); border-radius: 50%; width: 32px; height: 32px; font-size: 0.5rem; color: var(--primary); cursor: pointer; flex-shrink: 0; font-family: inherit; }

/* ---- nav ---- */
nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); display: flex; justify-content: center; gap: 12vw; padding: 20px 0 max(22px, env(safe-area-inset-bottom)); z-index: 100; }
nav button { background: none; border: none; font-family: inherit; font-size: 0.62rem; color: var(--sub); cursor: pointer; letter-spacing: 0.25em; text-transform: uppercase; padding: 4px 2px; border-bottom: 1px solid transparent; }
nav button.on { color: var(--primary); border-bottom-color: var(--primary); }

.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 14px 26px; font-size: 0.68rem; letter-spacing: 0.1em; z-index: 500; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; max-width: 92vw; }
.toast.show { opacity: 1; }
</style>
</head>

{t:"too 〜 to / 〜 enough to", e:"too 形容詞 to 動詞「〜すぎて…できない」、形容詞 enough to 動詞「…するのに十分〜」。enough は形容詞の後ろに置きます。",
 ex:[["I was too tired to cook.","疲れすぎて料理できなかった"],["This is easy enough to understand.","これは理解できるくらい簡単だ"]],
 q:[["This coffee is ___ hot to drink.",["very","too","so","much"],1],["He is old ___ to drive.（運転できる年齢だ）",["too","very","enough","much"],2],["enough の位置は？",["形容詞の前","形容詞の後ろ","文頭","どこでも"],1]]},
{t:"接続詞2（although / however）", e:"although「〜だけれども」は文と文をつなぎ、however「しかしながら」は文頭でやや硬めに逆接を表します。",
 ex:[["Although it was raining, we went out.","雨だったが出かけた"],["I was tired. However, I finished the work.","疲れていた。しかし仕事を終えた"]],
 q:[["___ he is busy, he always helps me.（忙しいのに）",["Because","Although","So","If"],1],["although の意味は？",["〜だから","もし〜なら","〜だけれども","〜のとき"],2],["I like him. ___, I don't agree with him.（しかし）",["Because","However","So","Although"],1]]},
{t:"仮定法の入り口（If I were you）", e:"現実と違う仮定は過去形で表します。If I were you, I would 〜「もし私があなたなら〜するだろう」。丁寧な助言の定番です。",
 ex:[["If I were you, I would take a taxi.","私ならタクシーに乗るね"],["If I had time, I would travel more.","時間があればもっと旅行するのに"]],
 q:[["If I ___ you, I would apologize.",["am","was","were","be"],2],["If I were you, I ___ go.（私なら行くだろう）",["will","would","did","am"],1],["「時間があれば行くのに（実際はない）」 If I ___ time, I would go.",["have","has","had","having"],2]]},
{t:"前置詞3（by / until / during）", e:"by「〜までに（期限）」、until「〜までずっと（継続）」、during「〜の間に（特定期間）」、for「〜の間（長さ）」。",
 ex:[["Please finish it by Friday.","金曜までに終わらせてください"],["I'll wait until seven.","7時まで待ちます"],["I visited Bali during the holidays.","休暇中にバリを訪れた"]],
 q:[["Come back ___ 5 p.m.（5時までに戻って）",["until","by","during","for"],1],["The shop is open ___ 10 p.m.（10時までずっと）",["by","until","during","at"],1],["___ the meeting, please turn off your phone.（会議の間）",["For","Until","During","By"],2]]},
{t:"丁寧表現の総仕上げ", e:"Would you mind 〜ing?「〜していただけますか」（答えは Not at all = いいですよ）、I was wondering if 〜「〜かなと思いまして」。最上級の丁寧さです。",
 ex:[["Would you mind opening the window?","窓を開けていただけますか？"],["I was wondering if you could help me.","手伝っていただけないかと思いまして"]],
 q:[["Would you mind ___ the door?",["close","to close","closing","closed"],2],["Would you mind 〜? に「いいですよ」は？",["Yes, I do.","Not at all.","No way.","I mind."],1],["I was ___ if you could join us.",["wondering","thinking","hoping so","wonder"],0]]},
{t:"would like（丁寧に「〜したい」）", e:"would like は want の丁寧版。I'd like a coffee.（コーヒーをください）。Would you like ...? で「〜はいかがですか」。店・初対面で安心して使えます。",
 ex:[["I'd like to make a reservation.","予約をしたいのですが"],["Would you like some tea?","お茶はいかがですか？"]],
 q:[["丁寧に「水が欲しい」は？",["I want water.","I'd like some water.","I like water.","Give me water."],1],["___ you like some coffee?",["Would","Will","Do","Are"],0],["I'd like ___ a reservation.",["make","to make","making","made"],1]]},
{t:"used to（以前はよく〜した）", e:"used to + 原形で「以前はよく〜した（今は違う）」。I used to live in Osaka.（昔は大阪に住んでいた）。※be used to 〜ing「〜に慣れている」は別物。",
 ex:[["I used to play soccer.","昔はサッカーをしていた"],["I'm used to getting up early.","早起きには慣れている"]],
 q:[["「昔はタバコを吸っていた」 I ___ smoke.",["use to","used to","am used to","was used"],1],["used to の後ろは？",["原形","ing形","過去形","過去分詞"],0],["「早起きに慣れている」 I'm used to ___ up early.",["get","to get","getting","got"],2]]},
{t:"助言のバリエーション（had better / Why don't you）", e:"You'd better 〜「〜したほうがいい（強め・警告）」、You should 〜「〜すべき」、Why don't you 〜?「〜したら？」。強さの違いを使い分けましょう。",
 ex:[["You'd better see a doctor.","医者に行ったほうがいいよ"],["Why don't you take a break?","休憩したら？"]],
 q:[["「休んだほうがいい（強め）」 You'd ___ rest.",["better","best","well","good"],0],["軽く勧める「試したら？」 ___ you try it?",["Why don't","How about","What about","Let's"],0],["Why don't you ___ a break?",["take","to take","taking","took"],0]]},
{t:"so ... that（とても〜なので…）", e:"so + 形容詞 + that 〜「とても〜なので…」。such a + 名詞 + that も同じ。I was so tired that I fell asleep.（疲れすぎて寝てしまった）。",
 ex:[["It was so hot that I couldn't sleep.","暑すぎて眠れなかった"],["It was such a good movie that I watched it twice.","とても良い映画で2回見た"]],
 q:[["I was ___ tired that I went to bed early.",["so","such","very","too"],0],["It was ___ a nice day that we went out.",["so","such","very","too"],1],["so ... that の意味は？",["〜すぎて…できない","とても〜なので…","〜と同じくらい","〜だけれど"],1]]},
{t:"伝聞（He said / He told me）", e:"人の言葉を伝えるとき。He said (that) he was busy.（彼は忙しいと言った）。tell は相手が必要: He told me (that) 〜。時制は1つ過去にずらすのが基本。",
 ex:[["She said she liked it.","彼女はそれが好きだと言った"],["He told me he would come.","彼は来ると言った"]],
 q:[["「彼は疲れていると言った」 He said he ___ tired.",["is","was","be","been"],1],["tell の後には？",["すぐ that","相手（me/him）","for","to だけ"],1],["She ___ me she was happy.",["said","told","spoke","talked"],1]]},
{t:"I wish（〜だったらいいのに）", e:"I wish + 過去形で「〜だったらいいのに（現実と違う願望）」。I wish I could speak English well.（英語が上手に話せたらなあ）。I hope（実現しそうな願い）と区別。",
 ex:[["I wish I had more time.","もっと時間があればなあ"],["I wish I could fly.","飛べたらいいのに"]],
 q:[["「お金があればなあ」 I wish I ___ money.",["have","had","has","having"],1],["I wish I ___ speak French.（話せたらなあ）",["can","could","will","do"],1],["実現しそうな願いは？",["I wish","I hope","I wanted","I wished"],1]]},
{t:"get + 変化（get tired / get married）", e:"get + 形容詞/過去分詞で「〜になる（変化）」。get tired（疲れる）、get better（良くなる）、get married（結婚する）、get lost（道に迷う）。会話で超頻出。",
 ex:[["It's getting cold.","寒くなってきた"],["I got lost.","道に迷った"]],
 q:[["「暗くなってきた」 It's ___ dark.",["getting","going","coming","making"],0],["get married の意味は？",["結婚する","離婚する","出会う","別れる"],0],["「疲れた」 I ___ tired.",["got","get to","gotten to","am get"],0]]},
{t:"don't have to と must not の違い", e:"混同注意！ don't have to 〜「〜しなくてよい（不要）」、must not 〜「〜してはいけない（禁止）」。You don't have to come.（来なくていい）≠ You must not come.（来てはいけない）。",
 ex:[["You don't have to pay.","払わなくていいよ"],["You must not smoke here.","ここでタバコを吸ってはいけない"]],
 q:[["「来なくていい」 You ___ come.",["don't have to","must not","can't","shouldn't"],0],["「入ってはいけない」 You ___ enter.",["don't have to","must not","need not","don't need"],1],["don't have to の意味は？",["禁止","義務","不要","許可"],2]]},
{t:"both / either / neither", e:"both「両方とも」、either「どちらか一方／（否定で）どちらも」、neither「どちらも〜ない」。Both are good.（両方いい）／Neither is good.（どちらもダメ）。",
 ex:[["Both of them are kind.","二人とも親切だ"],["Neither answer is correct.","どちらの答えも正しくない"]],
 q:[["「両方とも好き」 I like ___.",["both","either","neither","each"],0],["「どちらもダメ」 ___ is good.",["Both","Either","Neither","All"],2],["「コーヒーか紅茶どちらか」 ___ coffee or tea",["both","either","neither","all"],1]]},
{t:"one / ones（the red one）", e:"同じ名詞の繰り返しを避ける one。「赤いのをください」= I'll take the red one. 複数は ones。Which one?（どれ？）も頻出。",
 ex:[["I like the blue one.","青いのが好き"],["These ones are cheaper.","こっちのほうが安い"]],
 q:[["「大きいのをください」 I'll take the big ___.",["one","it","ones","that"],0],["「どれ？」",["Which one?","What one?","Where one?","Who one?"],0],["複数のときは？",["one","ones","it","them"],1]]},
{t:"something / anyone / nowhere", e:"some-/any-/no- + thing/body/where。something（何か）、anyone（誰か・誰も）、nowhere（どこにも〜ない）。肯定は some-、疑問・否定は any-。",
 ex:[["I want something to eat.","何か食べたい"],["There's nobody here.","ここには誰もいない"]],
 q:[["「何か飲みたい」 I want ___ to drink.",["something","anything","nothing","everything"],0],["「誰もいない」 There is ___ here.",["someone","anyone","no one","everyone"],2],["疑問文で「何か」は？",["something","anything","nothing","thing"],1]]},
{t:"It takes / It's ... to（形式主語 it）", e:"It takes + 時間 + to 〜「〜するのに（時間）かかる」。It's + 形容詞 + to 〜「〜するのは…だ」。It takes 10 minutes to walk.（歩いて10分）。",
 ex:[["It takes an hour to get there.","そこまで1時間かかる"],["It's hard to wake up early.","早起きは大変だ"]],
 q:[["「駅まで5分かかる」 It ___ 5 minutes to the station.",["takes","makes","gets","has"],0],["「英語を学ぶのは楽しい」 It's fun ___ learn English.",["to","for","at","of"],0],["It takes 20 minutes ___ get there.",["to","for","at","by"],0]]},
{t:"許可を求める（Can I / Could I / Is it OK if I）", e:"許可の丁寧さの段階。Can I 〜?（カジュアル）＜ Could I 〜?（丁寧）＜ Is it OK if I 〜?（やわらかい）。Can I sit here?（座っていい？）。",
 ex:[["Could I use your pen?","ペンをお借りできますか？"],["Is it OK if I open the window?","窓を開けてもいいですか？"]],
 q:[["丁寧に「入ってもいい？」",["Can I come in?","Could I come in?","I come in?","Come in I?"],1],["Can I ___ here?（座っていい？）",["sit","to sit","sitting","sat"],0],["Is it OK ___ I sit here?",["if","that","for","to"],0]]},
{t:"あいづち・つなぎ言葉", e:"会話を自然につなぐ言葉。Well,（ええと）、You know,（ほら）、I mean,（つまり）、Actually,（実は）、Let me see.（そうだなあ）。詰まったときの時間稼ぎにも。",
 ex:[["Well, I'm not sure.","うーん、よくわからない"],["Actually, I disagree.","実は反対なんだ"]],
 q:[["「実は」は？",["Actually","Exactly","Finally","Usually"],0],["言い直すときの「つまり」は？",["I mean","I know","I see","I hope"],0],["考える時間を稼ぐ一言は？",["Goodbye.","Let me see.","No way.","Me too."],1]]},
{t:"電話・オンラインの表現", e:"電話やビデオ通話の定番。This is Ken.（ケンです）、Can I speak to 〜?（〜さんをお願いします）、Hold on.（お待ちを）、Can you hear me?（聞こえますか）、You're breaking up.（途切れています）。",
 ex:[["This is Ken speaking.","ケンです"],["Can you hear me OK?","ちゃんと聞こえますか？"]],
 q:[["電話で「ケンです」は？",["I'm Ken.","This is Ken.","Here Ken.","Ken is."],1],["「少々お待ちください」",["Hold on, please.","Wait me.","Stop, please.","Stay you."],0],["「〜さんをお願いします」 Can I ___ to Mr. Tanaka?",["speak","talk","say","tell"],0]]},
],
id: [
{t:"語順の基本（主語＋動詞＋目的語）", e:"インドネシア語は英語と同じ「主語＋動詞＋目的語」の語順です。動詞は人称や時制で変化しません。活用がないので、単語を並べるだけで文が作れます。",
 ex:[["Saya makan nasi.","私はご飯を食べる"],["Dia minum kopi.","彼はコーヒーを飲む"]],
 q:[["「私はコーヒーを飲む」= Saya ___ kopi.",["minum","makan","pergi","tidur"],0],["Dia ___ nasi goreng.（彼はナシゴレンを食べる）",["minum","makan","melihat","membaca"],1],["インドネシア語の動詞は？",["主語で変化する","時制で変化する","変化しない","語尾にsが付く"],2]]},
{t:"人称代名詞", e:"saya 私 ／ kamu きみ（Anda あなた・丁寧）／ dia 彼・彼女 ／ kami 私たち（相手を含まない）／ kita 私たち（相手を含む）／ mereka 彼ら。",
 ex:[["Saya dari Jepang.","私は日本出身です"],["Mereka teman saya.","彼らは私の友達です"]],
 q:[["「彼・彼女」は？",["saya","dia","kamu","mereka"],1],["丁寧な「あなた」は？",["kamu","dia","Anda","kita"],2],["「彼ら」は？",["kami","kita","mereka","dia"],2]]},
{t:"所有の表し方", e:"「私の家」は rumah saya のように「名詞＋所有者」の順になります。日本語と語順が逆なので注意しましょう。",
 ex:[["rumah saya","私の家"],["nama saya","私の名前"],["teman dia","彼の友達"]],
 q:[["「私の名前」は？",["saya nama","nama saya","nama-saya","saya-nama"],1],["「彼の家」は？",["dia rumah","rumah dia","rumahnya saya","dia punya"],1],["所有を表す語順は？",["所有者＋名詞","名詞＋所有者","どちらでも良い","前置詞が必要"],1]]},
{t:"否定（tidak / bukan）", e:"動詞・形容詞を否定するときは tidak、名詞を否定するときは bukan を使います。",
 ex:[["Saya tidak makan daging.","私は肉を食べません"],["Ini bukan tas saya.","これは私のかばんではありません"]],
 q:[["Saya ___ mengerti.（わかりません）",["bukan","tidak","jangan","belum"],1],["Ini ___ mobil saya.（これは私の車ではない）",["tidak","jangan","bukan","belum"],2],["形容詞を否定するのは？",["bukan","tidak","jangan","apa"],1]]},
{t:"疑問文（Apakah・語尾上げ）", e:"文頭に Apakah を付けるか、文末を上げ調子で言うだけで疑問文になります。とてもシンプルです。",
 ex:[["Apakah kamu suka kopi?","コーヒーは好きですか？"],["Kamu orang Jepang?","日本人ですか？"]],
 q:[["疑問文を作るには？",["動詞を前に出す","Apakahを付ける","doを付ける","語順を逆にする"],1],["Apakah kamu ___ pedas?（辛いのは好き？）",["suka","mau","bisa","ada"],0],["「はい」は？",["Tidak","Ya","Bukan","Belum"],1]]},
{t:"疑問詞", e:"apa 何 ／ siapa 誰 ／ di mana どこ ／ kapan いつ ／ berapa いくつ・いくら ／ bagaimana どう。",
 ex:[["Ini apa?","これは何ですか？"],["Berapa harganya?","いくらですか？"]],
 q:[["「どこ」は？",["apa","kapan","di mana","siapa"],2],["値段を聞くときは？",["Siapa","Berapa","Kapan","Mengapa"],1],["Siapa nama Anda? の意味は？",["出身はどこ？","お名前は？","何歳？","元気？"],1]]},
{t:"時間表現（sudah / belum / akan / sedang）", e:"動詞の前に置くだけで時間を表せます。sudah もう〜した ／ belum まだ〜していない ／ akan 〜するつもり ／ sedang 〜している最中。",
 ex:[["Saya sudah makan.","もう食べました"],["Dia sedang tidur.","彼は寝ているところです"],["Saya akan pergi ke Bali.","バリへ行く予定です"]],
 q:[["「もう食べた」= Saya ___ makan.",["akan","sedang","sudah","belum"],2],["「まだです」は？",["Sudah","Belum","Akan","Sedang"],1],["「〜している最中」を表すのは？",["sudah","akan","sedang","belum"],2]]},
{t:"形容詞は名詞の後ろ", e:"「大きい家」は rumah besar のように「名詞＋形容詞」の順になります。",
 ex:[["rumah besar","大きい家"],["kopi panas","熱いコーヒー"],["orang baik","良い人"]],
 q:[["「熱いコーヒー」は？",["panas kopi","kopi panas","kopi yang","panas-kopi"],1],["「大きいかばん」は？",["besar tas","tas besar","tas kecil","besar-tas"],1],["形容詞の位置は？",["名詞の前","名詞の後ろ","文頭","文末のみ"],1]]},
{t:"数の言い方", e:"11〜19は「〜belas」、20・30…は「〜puluh」。21は dua puluh satu。買い物で頻出の ribu（千）も重要です（5万ルピア= lima puluh ribu）。",
 ex:[["lima belas","15"],["dua puluh","20"],["lima puluh ribu","50,000（5万）"]],
 q:[["「20」は？",["dua belas","dua puluh","sepuluh dua","dua ribu"],1],["「15」は？",["lima puluh","lima belas","satu lima","seribu lima"],1],["「5000」は？",["lima puluh","lima ratus","lima ribu","lima belas"],2]]},
{t:"場所の前置詞（di / ke / dari）", e:"di 〜で・〜に（場所）／ ke 〜へ ／ dari 〜から。この3つで移動と場所の表現はほぼカバーできます。",
 ex:[["Saya tinggal di Tokyo.","東京に住んでいます"],["Saya pergi ke pantai.","ビーチへ行きます"],["Dia datang dari Jakarta.","彼はジャカルタから来ました"]],
 q:[["Saya pergi ___ bandara.（空港へ行く）",["di","ke","dari","pada"],1],["Saya bekerja ___ Tokyo.（東京で働く）",["di","ke","dari","untuk"],0],["「日本から来ました」= Saya datang ___ Jepang.",["di","ke","dari","dengan"],2]]},
{t:"bisa / boleh", e:"bisa 〜できる ／ boleh 〜してもよい。どちらも動詞の前に置きます。Boleh saya ...? で「〜してもいいですか？」。",
 ex:[["Saya bisa berbahasa Indonesia sedikit.","少しインドネシア語ができます"],["Boleh saya duduk di sini?","ここに座ってもいいですか？"]],
 q:[["「泳げます」= Saya ___ berenang.",["boleh","bisa","mau","harus"],1],["___ saya masuk?（入ってもいいですか？）",["Bisa","Boleh","Mau","Akan"],1],["bisa の意味は？",["〜したい","〜できる","〜すべき","〜してよい"],1]]},
{t:"依頼と禁止（tolong / minta / jangan）", e:"Tolong ＋動詞「〜してください」、Minta ＋名詞「〜をください」、Jangan ＋動詞「〜しないで」。",
 ex:[["Tolong bicara pelan-pelan.","ゆっくり話してください"],["Minta air.","お水をください"],["Jangan lupa.","忘れないで"]],
 q:[["「手伝ってください」= ___ bantu saya.",["Jangan","Tolong","Bukan","Tidak"],1],["「お水をください」= ___ air.",["Minta","Jangan","Bukan","Apakah"],0],["「忘れないで」= ___ lupa.",["Tolong","Minta","Jangan","Tidak"],2]]},
{t:"比較（lebih ... daripada）", e:"「AはBより〜」は A lebih 形容詞 daripada B。「一番〜」は paling ＋形容詞。",

{t:"yang の使い方", e:"yang は「〜のもの・〜なほう」。Saya mau yang ini.「これが欲しい」のように、お店や注文でとても便利な単語です。",

 q:[["「大きいほうをください」= Minta ___ besar.",["yang","ini","itu","di"],0],["Saya mau ___ ini.（これが欲しい）",["yang","apa","di","ke"],0],["yang のはたらきは？",["否定する","「〜のほう」を表す","過去を表す","場所を表す"],1]]},
{t:"丁寧な会話", e:"Permisi すみません（声かけ）／ Silakan どうぞ ／ Terima kasih banyak 本当にありがとう ／ Boleh saya minta ...? 〜をいただけますか？",

 q:[["人に声をかける「すみません」は？",["Maaf","Permisi","Tolong","Jangan"],1],["「どうぞ」は？",["Silakan","Sama-sama","Permisi","Minta"],0],["Boleh saya minta air? の意味は？",["水を飲めますか","お水をいただけますか","水はありますか","水が好きです"],1]]},
{t:"接続詞（dan / tapi / jadi / karena）", e:"dan そして ／ tapi でも ／ jadi だから ／ karena なぜなら。文をつなげると一気に会話らしくなります。",
 ex:[["Saya lapar, jadi saya makan.","おなかがすいたので食べた"],["Saya suka kopi, tapi tidak suka teh.","コーヒーは好きだけど紅茶は好きじゃない"]],
 q:[["Saya capek, ___ saya tidur.（疲れたので寝た）",["tapi","jadi","dan","atau"],1],["Saya tinggal di rumah ___ hujan.（雨だから家にいた）",["jadi","dan","karena","tapi"],2],["Saya suka nasi ___ mie.（ご飯も麺も好き）",["dan","tapi","jadi","karena"],0]]},
{t:"勧誘（Ayo / Mari）", e:"Ayo ＋動詞「〜しよう！」（口語的）、Mari ＋動詞「〜しましょう」（丁寧）。誘えると友達が増えます。",
 ex:[["Ayo makan!","食べよう！"],["Mari kita mulai.","始めましょう"]],
 q:[["「行こう！」は？",["Ayo pergi!","Jangan pergi!","Sudah pergi.","Belum pergi."],0],["丁寧に「始めましょう」は？",["Ayo cepat","Mari kita mulai","Jangan mulai","Sudah mulai"],1],["Ayo の意味は？",["やめよう","〜しよう","まだ","もう"],1]]},
{t:"経験（pernah）", e:"pernah を動詞の前に置くと「〜したことがある」。否定は belum pernah「まだ〜したことがない」／ tidak pernah「一度も〜しない」。",
 ex:[["Saya pernah pergi ke Bali.","バリに行ったことがある"],["Saya belum pernah makan durian.","ドリアンをまだ食べたことがない"]],
 q:[["「行ったことがある」= Saya ___ pergi.",["akan","pernah","sedang","mau"],1],["「まだ食べたことがない」= Saya ___ pernah makan.",["tidak","bukan","belum","jangan"],2],["Apakah kamu pernah ke Jepang? の意味は？",["日本に行きたい？","日本に行ったことある？","日本に住んでる？","日本が好き？"],1]]},
{t:"願望（mau / ingin）", e:"mau ＋動詞「〜したい」（口語で最頻出）、ingin はやや丁寧・強い願望。mau は「欲しい」の意味でも使えます。",
 ex:[["Saya mau makan nasi goreng.","ナシゴレンが食べたい"],["Saya ingin belajar bahasa Indonesia.","インドネシア語を学びたい"]],
 q:[["「飲みたい」= Saya ___ minum.",["mau","bisa","harus","pernah"],0],["Mau ke mana?（どこ行くの？）の mau は？",["〜できる","〜したい","〜すべき","〜した"],1],["「これが欲しい」= Saya ___ ini.",["mau","ada","dari","ke"],0]]},
{t:"義務（harus）", e:"harus ＋動詞「〜しなければならない」。tidak usah「〜しなくていい」も一緒に覚えると便利です。",
 ex:[["Saya harus bekerja besok.","明日働かなければならない"],["Kamu tidak usah bayar.","払わなくていいよ"]],
 q:[["「行かなければならない」= Saya ___ pergi.",["mau","bisa","harus","pernah"],2],["harus の意味は？",["〜したい","〜できる","〜しなければ","〜したことがある"],2],["「払わなくていい」= Tidak ___ bayar.",["usah","bisa","mau","ada"],0]]},
{t:"頻度（selalu / sering / kadang-kadang / jarang）", e:"selalu いつも ／ sering よく ／ kadang-kadang ときどき ／ jarang めったに〜ない ／ tidak pernah 一度も〜ない。動詞の前に置きます。",
 ex:[["Saya selalu minum kopi pagi.","朝はいつもコーヒーを飲む"],["Dia jarang datang.","彼はめったに来ない"]],
 q:[["「ときどき」は？",["selalu","sering","kadang-kadang","jarang"],2],["頻度が一番高いのは？",["jarang","kadang-kadang","sering","selalu"],3],["Saya ___ makan di warung.（よく食堂で食べる）",["sering","jarang","belum","bukan"],0]]},
{t:"「ある・いる」（ada）", e:"ada は「ある・いる」。Ada ...? で「〜ありますか？」と聞けます。存在を表す万能動詞です。",
 ex:[["Ada toilet di sini?","ここにトイレはありますか？"],["Tidak ada masalah.","問題ないです"]],
 q:[["「ATMはありますか？」= ___ ATM?",["Ada","Apa","Mana","Siapa"],0],["「時間がない」= Tidak ___ waktu.",["ada","bisa","mau","harus"],0],["Ada berapa orang?（何人いますか？）の ada は？",["行く","ある・いる","食べる","話す"],1]]},
{t:"me-動詞の仕組み", e:"辞書の見出しは語根（beli 買う）で、丁寧な文では me- が付きます（membeli）。日常会話では語根だけでも通じることが多いです。b→mem、t→men（tが消える: tulis→menulis）など音で変化します。",
 ex:[["beli → membeli","買う"],["tulis → menulis","書く"],["kirim → mengirim","送る"]],
 q:[["tulis（書く）の me-形は？",["metulis","menulis","memtulis","mengtulis"],1],["membeli の語根は？",["mbeli","beli","embeli","li"],1],["日常会話では？",["必ずme-形を使う","語根だけでも通じることが多い","過去形にする","英語を使う"],1]]},
{t:"ber-動詞の仕組み", e:"ber- が付く動詞は「〜を身につけている・〜の状態」を表すものが多いです。berjalan 歩く（jalan 道）、berbicara 話す（bicara）、bekerja 働く（kerja 仕事）。",
 ex:[["berjalan","歩く（jalan = 道）"],["bekerja","働く（kerja = 仕事）"],["berbahasa Indonesia","インドネシア語を話す"]],
 q:[["kerja（仕事）の動詞形は？",["berkerja","bekerja","mengerja","kerjaan"],1],["berjalan の語根 jalan の意味は？",["家","道","車","仕事"],1],["「インドネシア語ができます」= Saya bisa ___ Indonesia.",["berbahasa","membahasa","bahasakan","bahasanya"],0]]},
{t:"強調と程度（sekali / banget / lumayan）", e:"enak sekali とてもおいしい（後置）／ banget（口語の「超」）／ lumayan まあまあ ／ terlalu 〜すぎる。程度が言えると感想が豊かになります。",
 ex:[["Enak sekali!","とてもおいしい！"],["Murah banget!","超安い！（口語）"],["Lumayan.","まあまあかな"]],
 q:[["「とてもおいしい」= Enak ___.",["sekali","sedikit","jarang","belum"],0],["口語の「超」は？",["lumayan","banget","terlalu","jarang"],1],["「辛すぎる」= ___ pedas.",["Sekali","Lumayan","Terlalu","Banget"],2]]},
{t:"受動態（di-動詞）", e:"動詞の頭に di- を付けると「〜される」。dibuat（作られる）、dijual（売られる）。看板やメニューで頻出です。",
 ex:[["Nasi goreng ini dibuat oleh ibu saya.","このナシゴレンは母が作りました"],["Tiket dijual di sini.","チケットはここで売られています"]],
 q:[["「売られる」は？",["menjual","dijual","jualan","terjual"],1],["Kue ini ___ oleh Made.（このお菓子はマデが作った）",["membuat","dibuat","buatan","pembuat"],1],["di- が表すのは？",["〜する","〜される","〜したい","〜できる"],1]]},
{t:"-kan動詞（〜してあげる・〜させる）", e:"動詞に -kan を付けると「（誰かのために）〜してあげる」等の意味が加わります。membelikan（買ってあげる）、mengembalikan（返す）。",
 ex:[["Saya membelikan istri saya tas.","妻にかばんを買ってあげた"],["Tolong kembalikan buku ini.","この本を返してください"]],
 q:[["membeli と membelikan の違いは？",["同じ意味","-kanは「買ってあげる」","過去形になる","否定になる"],1],["Tolong ___ pintu.（ドアを開けてください）",["buka","bukakan","dibuka","membuka"],1],["「教えてください」= Tolong ___.",["ajarkan","diajar","belajar","pelajar"],0]]},
{t:"-nya の使い方", e:"名詞に -nya を付けると「その〜・例の〜」や「彼/彼女の〜」。harganya（その値段）、enaknya（おいしさ）。会話で非常によく使われます。",
 ex:[["Berapa harganya?","（その）値段はいくらですか？"],["Rumahnya besar.","彼の家は大きい／その家は大きい"]],
 q:[["Berapa harganya? の -nya は？",["丁寧にする","「その」を表す","複数を表す","過去を表す"],1],["「彼の名前」= ___",["nama-nya → namanya","dia nama","nama dia saja","penama"],0],["「天気はどう？」= Bagaimana ___?（その天気）",["cuacanya","cuaca-kan","dicuaca","bercuaca"],0]]},
{t:"重複語（繰り返しの言葉）", e:"単語を2回繰り返すと複数・強調・「〜など」を表します。jalan-jalan（散歩・おでかけ）、buah-buahan（果物類）、hati-hati（気をつけて）。",
 ex:[["Kami jalan-jalan di pantai.","私たちはビーチを散歩した"],["Saya suka buah-buahan.","果物（いろいろ）が好きです"]],
 q:[["jalan-jalan の意味は？",["道路","散歩・おでかけ","まっすぐ","早歩き"],1],["「気をつけて」は？",["hati","hati-hati","kehati","perhati"],1],["oleh-oleh の意味は？",["おみやげ","荷物","財布","切符"],0]]},
{t:"kalau / waktu（もし〜・〜のとき）", e:"kalau「もし〜なら」、waktu(ketika)「〜のとき」。文頭に置いてコンマで区切ります。",
 ex:[["Kalau hujan, saya di rumah saja.","雨なら家にいます"],["Waktu saya di Bali, saya makan sate setiap hari.","バリにいたとき毎日サテを食べた"]],
 q:[["「もし安ければ買います」= ___ murah, saya beli.",["Waktu","Kalau","Karena","Supaya"],1],["「子どものとき」= ___ saya kecil",["kalau","waktu","jadi","tapi"],1],["kalau の意味は？",["〜のとき","もし〜なら","〜だから","〜なのに"],1]]},
{t:"untuk / supaya（〜のために）", e:"untuk + 名詞/動詞「〜のため（に）」、supaya + 文「〜するように」。目的を言えると説明力が上がります。",
 ex:[["Ini untuk Anda.","これはあなたのためのものです（どうぞ）"],["Saya belajar setiap hari supaya bisa berbicara.","話せるように毎日勉強しています"]],
 q:[["Ini hadiah ___ kamu.（きみへのプレゼント）",["untuk","supaya","dari","dengan"],0],["Saya datang ___ bertemu Anda.（会うために来た）",["untuk","kalau","waktu","tapi"],0],["supaya の意味は？",["〜のとき","〜だから","〜するように","〜だけど"],2]]},
{t:"baru saja（〜したばかり）と時間表現の整理", e:"baru saja（〜したばかり）/ sudah（もう）/ belum（まだ）/ sedang（〜中）/ akan（〜する予定）/ masih（まだ〜している）。動詞の前に置くだけで時間が表せます。",
 ex:[["Saya baru saja sampai.","着いたばかりです"],["Dia masih tidur.","彼はまだ寝ています"]],
 q:[["「食べたばかり」= Saya ___ makan.",["masih","baru saja","akan","belum"],1],["「まだ働いています」= Saya ___ bekerja.",["sudah","masih","baru","akan"],1],["「もう終わった？」= ___ selesai?",["Sudah","Belum","Masih","Akan"],0]]},
{t:"口語インドネシア語", e:"日常会話では省略形が多用されます。tidak→gak／nggak、sudah→udah、saja→aja、tetapi→tapi。聞き取りのために知っておきましょう。",
 ex:[["Gak apa-apa.","大丈夫だよ（= Tidak apa-apa）"],["Udah makan?","もう食べた？（= Sudah makan?）"]],
 q:[["gak は何の口語形？",["sudah","tidak","saja","bisa"],1],["udah は何の口語形？",["sudah","belum","masih","akan"],0],["「それだけ」= itu ___（口語）",["aja","gak","udah","deh"],0]]},
{t:"呼びかけの敬称（Pak / Bu / Mas / Mbak）", e:"男性には Pak（〜さん）、女性には Bu、若い男性に Mas、若い女性に Mbak。名前が分からなくても失礼になりません。",
 ex:[["Permisi, Pak.","すみません（男性に）"],["Terima kasih, Bu.","ありがとうございます（女性に）"]],
 q:[["年配の男性への呼びかけは？",["Bu","Pak","Mbak","Dik"],1],["女性への丁寧な呼びかけは？",["Pak","Mas","Bu","Om"],2],["店員の若い女性に声をかけるなら？",["Pak","Mbak","Bapak","Kek"],1]]},
{t:"場所の表現まとめ", e:"di depan 〜の前 / di belakang 〜の後ろ / di samping 〜のとなり / di antara A dan B AとBの間 / di dalam 〜の中 / di atas 〜の上 / di bawah 〜の下。",
 ex:[["ATM ada di samping pintu masuk.","ATMは入口のとなりにあります"],["Hotel saya di antara pantai dan pasar.","私のホテルはビーチと市場の間です"]],
 q:[["「〜の前」は？",["di belakang","di depan","di bawah","di dalam"],1],["Kunci ada ___ meja.（テーブルの上に）",["di atas","di antara","di depan","ke atas"],0],["「AとBの間」= di ___ A dan B",["samping","antara","dalam","atas"],1]]},
{t:"ter-（最上級・思わず〜）", e:"ter- + 形容詞で「最も〜」（= paling）。terbesar（最大の）、termurah（最安の）。動詞に付くと「思わず・うっかり」: tertidur（寝落ちする）。",
 ex:[["Ini yang termurah.","これが一番安いものです"],["Saya tertidur di kereta.","電車で寝てしまった"]],
 q:[["「最大の」は？",["besar-besar","terbesar","dibesar","kebesar"],1],["termurah = ___ murah",["paling","lebih","kurang","agak"],0],["tertidur の意味は？",["寝かせる","寝てしまった","眠くない","起きた"],1]]},
{t:"se-（〜と同じくらい・1つの）", e:"se + 形容詞で「同じくらい〜」: sebesar（同じ大きさ）。se + 名詞で「1つの・全体の」: sehari（1日）、sekeluarga（家族全員）。",
 ex:[["Tasnya sebesar tas saya.","彼のかばんは私のと同じ大きさだ"],["Saya belajar dua jam sehari.","1日に2時間勉強します"]],
 q:[["「1日」は？",["sehari","satu-hari","harian","perhari"],0],["sebesar の意味は？",["より大きい","同じ大きさ","最大","小さい"],1],["「家族全員」は？",["keluarga-keluarga","sekeluarga","terkeluarga","berkeluarga"],1]]},
{t:"sebelum / sesudah（〜の前に・後に）", e:"sebelum「〜の前に」、sesudah（= setelah）「〜の後に」。文頭でも文中でも使えます。",
 ex:[["Sebelum makan, cuci tangan dulu.","食べる前にまず手を洗って"],["Sesudah bekerja, saya berolahraga.","仕事の後に運動します"]],
 q:[["「寝る前に」= ___ tidur",["sesudah","sebelum","selama","sambil"],1],["sesudah と同じ意味は？",["sebelum","setelah","sebentar","selalu"],1],["___ makan, saya minum kopi.（食後に）",["Sebelum","Sesudah","Supaya","Kalau"],1]]},
{t:"sambil（〜しながら）", e:"sambil + 動詞で「〜しながら」。2つの動作を同時に行うときに使います。",
 ex:[["Saya belajar sambil mendengarkan musik.","音楽を聞きながら勉強します"],["Jangan makan sambil berjalan.","歩きながら食べないで"]],
 q:[["「音楽を聞きながら」= ___ mendengarkan musik",["sebelum","sambil","sesudah","supaya"],1],["sambil の意味は？",["〜の前に","〜しながら","〜だから","〜の後で"],1],["Dia bekerja ___ kuliah.（働きながら大学に通う）",["sambil","kalau","karena","atau"],0]]},
{t:"pe-名詞（〜する人）", e:"pe- + 語根で「〜する人」。pekerja（労働者）、penjual（売る人）、pembeli（買う人）、penyanyi（歌手）。動詞から人を表す名詞が作れます。",
 ex:[["penjual","売る人・店員（jual = 売る）"],["pembeli","買う人・客（beli = 買う）"],["penyanyi","歌手（nyanyi = 歌う）"]],
 q:[["「歌手」は？",["menyanyi","penyanyi","nyanyian","bernyanyi"],1],["pembeli の意味は？",["売る人","買う人","作る人","運ぶ人"],1],["pekerja の語根は？",["perja","kerja","peker","erja"],1]]},
{t:"ke-an名詞（〜さ・〜であること）", e:"ke + 語根 + an で抽象名詞を作ります。kesehatan（健康 ← sehat）、kebersihan（清潔さ ← bersih）、keamanan（安全 ← aman）。",
 ex:[["kesehatan","健康（sehat = 健康な）"],["kecepatan","速度（cepat = 速い）"],["kebahagiaan","幸福（bahagia = 幸せな）"]],
 q:[["「健康」（名詞）は？",["sehat-sehat","kesehatan","tersehat","penyehat"],1],["kecepatan の語根は？",["cepat","kecep","patan","epat"],0],["ke-an が作るのは？",["動詞","抽象名詞","形容詞","命令形"],1]]},
{t:"saling / sendiri（お互いに・自分で）", e:"saling + 動詞「お互いに〜し合う」: saling membantu（助け合う）。sendiri「自分で・ひとりで」: Saya buat sendiri.（自分で作った）。",
 ex:[["Kami saling membantu.","私たちは助け合っています"],["Saya masak sendiri.","自分で料理します"]],
 q:[["「助け合う」= ___ membantu",["sendiri","saling","sambil","sama"],1],["「自分で作った」= buat ___",["saling","sendiri","bersama","berdua"],1],["saling mengerti の意味は？",["自分を理解する","お互いを理解し合う","理解できない","理解させる"],1]]},
{t:"sempat / jadi（〜する余裕があった・結局）", e:"sempat「（時間があって）〜できた・〜する暇があった」、tidak sempat「〜しそびれた」、jadi「結局〜になった」、tidak jadi「（予定が）なしになった」。",
 ex:[["Saya tidak sempat sarapan.","朝食をとる時間がなかった"],["Kami tidak jadi pergi.","私たちは結局行かないことになった"]],
 q:[["「食べる時間がなかった」= Saya tidak ___ makan.",["jadi","sempat","bisa","boleh"],1],["tidak jadi の意味は？",["中止になった","始まった","できた","間に合った"],0],["Sempat ke Bali?（バリに行く時間あった？）の sempat は？",["絶対に","時間の余裕","禁止","義務"],1]]},
{t:"丁寧なお願い（Mohon / Terima kasih atas 〜）", e:"Mohon + 動詞「どうか〜してください」（tolong より丁寧・掲示でも使う）。Terima kasih atas + 名詞「〜に感謝します」。",
 ex:[["Mohon tunggu sebentar.","少々お待ちくださいませ"],["Terima kasih atas bantuan Anda.","ご協力に感謝します"]],
 q:[["掲示の「お静かに願います」= ___ tenang.",["Minta","Mohon","Ayo","Mari"],1],["Terima kasih ___ bantuannya.（助けに感謝）",["atas","untuk saja","dari","ke"],0],["mohon と tolong では？",["tolongが丁寧","mohonが丁寧","同じ","どちらも失礼"],1]]},
{t:"数の表現2（序数・回数・分数）", e:"「〜番目」は ke + 数字: pertama（1番目・最初）、kedua（2番目）。「〜回」は 数字 + kali: dua kali（2回）。「半分」は setengah。",
 ex:[["Ini kali pertama saya ke Bali.","バリに来るのは初めてです"],["Saya sudah dua kali makan rendang.","ルンダンは2回食べたことがある"]],
 q:[["「2番目」は？",["dua-dua","kedua","sedua","dua kali"],1],["「3回」は？",["ketiga","tiga kali","sekali tiga","tiga-tiga"],1],["「最初の・1番目の」は？",["pertama","sekali","kesatu-satu","perdana menteri"],0]]},
{t:"語気助詞（dong / sih / kok / deh）", e:"日常会話の「味付け」。dong（〜してよ・当然でしょ、甘え）、sih（一体／まあ）、kok（え、なんで）、deh（まあいいや・強調）。文末に付けるだけで自然になり、聞き取りにも必須です。",
 ex:[["Ayo dong!","ねえ行こうよ！"],["Kenapa sih?","一体どうしたの？"]],
 q:[["「行こうよ〜」と甘えるなら？",["Ayo dong!","Ayo kok!","Ayo sih!","Ayo deh!"],0],["「一体なんで？」の語気は？",["dong","sih","deh","kan"],1],["語気助詞の位置は？",["文頭","文末","動詞の前","主語の前"],1]]},

/* =====================================================
   状態管理
===================================================== */
const KEY = 'mignon-lingo-v2';
const OLD_KEY = 'mignon-lingo-v1';
let state = load();
state.dlg = state.dlg || { en: 0, id: 0 };

function freshState() {
  return {
    startDate: todayStr(),
    xp: 0,
    streak: 0,
    bestStreak: 0,
    lastGoalDate: null,
    srs: {},           // id -> {box, due, reps, lapses}
    log: {},           // date -> {cards, newEn, newId, g, r, s}
    gram: { en: { next: 0 }, id: { next: 0 } },
    read: { en: 0, id: 0 },
    dlg: { en: 0, id: 0 },
    custom: [],        // [id, lang, word, meaning]
    customSeq: 0,
    settings: { newPerDay: 8, cardsGoal: 40, vocabLang: 'mix', rate: 0.95 },
  };
}
function load() {
  try {
    const s = JSON.parse(localStorage.getItem(KEY));
    if (s && s.startDate) return s;
  } catch (e) {}
  // v1からの引き継ぎ
  try {
    const old = JSON.parse(localStorage.getItem(OLD_KEY));
    if (old && old.startDate) {
      const s = freshState();
      s.startDate = old.startDate;
      s.xp = old.xp || 0;
      s.streak = old.streak || 0;
      s.bestStreak = old.bestStreak || 0;
      s.lastGoalDate = old.lastGoalDate || null;
      s.srs = old.srs || {};
      s.custom = old.custom || [];
      s.customSeq = old.customSeq || 0;
      Object.keys(old.log || {}).forEach(d => {
        s.log[d] = { cards: old.log[d].done || 0, newEn: old.log[d].newEn || 0, newId: old.log[d].newId || 0, g: false, r: false, s: false };
      });
      return s;
    }
  } catch (e) {}
  return freshState();
}
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

function todayStr(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function addDays(dateStr, n) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + n);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function dayNumber() {
  const ms = new Date(todayStr()) - new Date(state.startDate);
  return Math.floor(ms / 86400000) + 1;
}
function todayLog() {
  const t = todayStr();
  if (!state.log[t]) state.log[t] = { cards: 0, newEn: 0, newId: 0, g: false, r: false, s: false };
  return state.log[t];
}
function level(xp) { return Math.floor(Math.sqrt(xp / 60)) + 1; }
function xpForLevel(lv) { return (lv - 1) * (lv - 1) * 60; }
function totalCards(s) { return Object.values(s.log).reduce((a, d) => a + (d.cards || 0), 0); }
function perfectDays(s) {
  return Object.values(s.log).filter(d => d.cards >= s.settings.cardsGoal && d.g && d.r && d.s).length;
}
/* 今日の文法・リーディングの言語（毎日交互、両言語に毎日触れる） */
function grammarLangToday() { return dayNumber() % 2 === 1 ? 'en' : 'id'; }
function readingLangToday() { return dayNumber() % 2 === 1 ? 'id' : 'en'; }

/* 全カード（内蔵 + カスタム） */
function allCards() {
  const cards = [];
  EN_WORDS.forEach((w, i) => cards.push({ id: 'e' + i, lang: 'en', word: w[0], meaning: w[1], cat: w[2], forms: w[3] || '' }));
  ID_WORDS.forEach((w, i) => cards.push({ id: 'i' + i, lang: 'id', word: w[0], meaning: w[1], cat: w[2], forms: w[3] || '' }));
  state.custom.forEach(c => cards.push({ id: c[0], lang: c[1], word: c[2], meaning: c[3], cat: 'マイ単語', forms: '' }));
  return cards;
}
function cardById(id) { return allCards().find(c => c.id === id); }
function masteredCount() {
  return Object.values(state.srs).filter(r => r.box >= 3).length;
}
function dueCards(lang) {
  const t = todayStr();
  return allCards().filter(c =>
    (lang === 'mix' || c.lang === lang) &&
    state.srs[c.id] && state.srs[c.id].due <= t
  );
}
function newCards(lang) {
  return allCards().filter(c =>
    (lang === 'mix' || c.lang === lang) && !state.srs[c.id]
  );
}
function newRemainingToday(lang) {
  const log = todayLog();
  const used = lang === 'en' ? log.newEn : log.newId;
  return Math.max(0, state.settings.newPerDay - used);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* =====================================================
   タスク共通
===================================================== */
function completeTask(flag, xp) {
  const log = todayLog();
  const first = !log[flag];
  log[flag] = true;
  state.xp += xp;
  checkGoalAndStreak();
  save();
  return first;
}
function checkGoalAndStreak() {
  const t = todayStr();
  const log = todayLog();
  const allDone = log.cards >= state.settings.cardsGoal && log.g && log.r && log.s;
  if (allDone && state.lastGoalDate !== t) {
    if (state.lastGoalDate === todayStr(-1)) state.streak++;
    else state.streak = 1;
    state.bestStreak = Math.max(state.bestStreak, state.streak);
    state.lastGoalDate = t;
    state.xp += 30;
    toast(`本日の全タスク完了 — ${state.streak}日連続`);
  }
}
function studyHeader(label, current, total) {
  return `
    <div class="study-top">
      <span>${label}${total ? `　${current} / ${total}` : ''}</span>
      <button onclick="showView('home')">中断</button>
    </div>
    <div class="qline"><div style="width:${total ? Math.round((current-1)/total*100) : 0}%"></div></div>`;
}

/* =====================================================
   1. 単語トレーニング（SRS）
===================================================== */
let session = null;

function startSession(lang) {
  const due = shuffle(dueCards(lang));
  let news = [];
  if (lang === 'mix') {
    news = shuffle(newCards('en')).slice(0, newRemainingToday('en'))
      .concat(shuffle(newCards('id')).slice(0, newRemainingToday('id')));
  } else {
    news = shuffle(newCards(lang)).slice(0, newRemainingToday(lang));
  }
  const queue = due.concat(shuffle(news));
  if (queue.length === 0) {
    toast('復習も新規もありません。明日また復習カードが届きます');
    return;
  }
  session = { lang, queue, index: 0, total: queue.length, xpGain: 0, correct: 0, revealed: false };
  showStudyView();
  showStudyCard();
}

function showStudyCard() {
  const v = document.getElementById('view-study');
  if (session.index >= session.queue.length) { finishSession(); return; }

  const card = session.queue[session.index];
  const rec = state.srs[card.id];
  const isNew = !rec;
  // 2回目以降のカードは、意味クイズ・リスニング・フラッシュカードを混ぜて出題
  const roll = Math.random();
  const mode = rec && rec.reps >= 1 ? (roll < 0.35 ? 'quiz' : roll < 0.65 ? 'listen' : 'flash') : 'flash';

  let cardHtml;
  if (mode === 'quiz') {
    const pool = allCards().filter(c => c.lang === card.lang && c.id !== card.id);
    const choices = shuffle([card].concat(shuffle(pool).slice(0, 3)));
    cardHtml = `
      <div class="flashcard" style="min-height:190px;padding-bottom:28px">
        <div class="lang-tag">${LANG_NAME[card.lang]}</div>
        <div class="word q">「${esc(card.meaning)}」は？</div>
      </div>
      <div>${choices.map(c => `<button class="choice-btn" data-id="${c.id}" onclick="answerQuiz(this,'${card.id}')">${esc(c.word)}</button>`).join('')}</div>`;
  } else if (mode === 'listen') {
    const pool = allCards().filter(c => c.lang === card.lang && c.id !== card.id && c.meaning !== card.meaning);
    const choices = shuffle([card].concat(shuffle(pool).slice(0, 3)));
    cardHtml = `
      <div class="flashcard" style="min-height:190px;padding-bottom:28px">
        <div class="lang-tag">${LANG_NAME[card.lang]} — Listening</div>
        <div class="word q">音声を聞いて意味を選んでください</div>
        <button class="speak-btn" onclick="speak('${card.id}')">&#9654;</button>
      </div>
      <div>${choices.map(c => `<button class="choice-btn" data-id="${c.id}" onclick="answerQuiz(this,'${card.id}')">${esc(c.meaning)}</button>`).join('')}</div>`;
  } else {
    cardHtml = `
      <div class="flashcard">
        ${isNew ? '<div class="newtag">NEW</div>' : ''}
        <div class="lang-tag">${LANG_NAME[card.lang]}</div>
        <div class="catg">${esc(card.cat)}</div>
        <div class="word">${esc(card.word)}</div>
        <button class="speak-btn" onclick="speak('${card.id}')">&#9654;</button>
        <div class="meaning" id="meaning" style="visibility:hidden">${esc(card.meaning)}${card.forms ? `<div class="forms">${esc(card.forms)}</div>` : ''}</div>
      </div>
      <div class="btn-row" id="answer-btns">
        <button class="abtn show" onclick="reveal()">答えを見る</button>
      </div>`;
  }

  v.innerHTML = studyHeader('単語', session.index + 1, session.queue.length) + cardHtml;
  if (mode !== 'quiz') speak(card.id); // 意味クイズで音を流すと答えがバレるため
  session.revealed = false;
}

function reveal() {
  if (session.revealed) return;
  session.revealed = true;
  document.getElementById('meaning').style.visibility = 'visible';
  document.getElementById('answer-btns').innerHTML = `
    <button class="abtn" onclick="grade('again')">もう一度<small>すぐ再出題</small></button>
    <button class="abtn" onclick="grade('hard')">あいまい<small>明日また</small></button>
    <button class="abtn good" onclick="grade('good')">覚えた<small>間隔をあける</small></button>`;
}

function answerQuiz(btn, correctId) {
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.id === correctId) b.classList.add('correct');
  });
  const ok = btn.dataset.id === correctId;
  if (!ok) btn.classList.add('wrong');
  speak(correctId);
  setTimeout(() => {
    if (ok) { session.xpGain += 3; session.correct++; grade('good', true); }
    else grade('again', true);
  }, ok ? 700 : 1400);
}

function grade(rating, silent) {
  const card = session.queue[session.index];
  const rec = state.srs[card.id] || { box: 0, due: todayStr(), reps: 0, lapses: 0 };
  const wasNew = !state.srs[card.id];

  if (rating === 'again') {
    rec.box = 1;
    rec.lapses++;
    rec.due = todayStr();
    session.queue.splice(Math.min(session.index + 3, session.queue.length), 0, card);
  } else if (rating === 'hard') {
    rec.box = Math.max(1, rec.box);
    rec.due = todayStr(1);
  } else {
    rec.box = Math.min(INTERVALS.length - 1, rec.box + 1);
    rec.due = todayStr(INTERVALS[rec.box]);
    session.correct++;
  }
  rec.reps++;
  state.srs[card.id] = rec;

  const log = todayLog();
  log.cards++;
  if (wasNew) { card.lang === 'en' ? log.newEn++ : log.newId++; }
  session.xpGain += 5;
  state.xp += rating === 'again' ? 2 : 5;

  checkGoalAndStreak();
  save();
  session.index++;
  showStudyCard();
}

function finishSession() {
  const acc = session.total ? Math.round(session.correct / session.total * 100) : 0;
  state.xp += 15;
  save();
  const log = todayLog();
  const remaining = Math.max(0, state.settings.cardsGoal - log.cards);
  document.getElementById('view-study').innerHTML = `
    <div class="done-card">
      <div class="ttl">Complete</div>
      <p>${session.total}枚のカードを学習しました　正答率 ${acc}%<br>${remaining > 0 ? `本日の目標まであと${remaining}枚` : '本日の単語ノルマ達成'}</p>
      <div class="xp-gain">+ ${session.xpGain + 15} XP</div>
      <div class="center-row">
        ${remaining > 0 ? `<button class="primary-btn" onclick="startSession(state.settings.vocabLang)">続けて学習</button><br>` : ''}
        <button class="${remaining > 0 ? 'ghost-btn' : 'primary-btn'}" onclick="showView('home')">ホームへ</button>
      </div>
    </div>`;
  session = null;
}

function answerGrammar(btn, ans) {
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;

  if (!ok) btn.classList.add('wrong');

  setTimeout(() => { gsession.qIndex++; renderGrammarQ(); }, ok ? 700 : 1500);
}

function finishGrammar() {
  const g = gsession;

/* =====================================================
   Extra: 実力テスト（何度でも反復可・SRSには影響しない）
===================================================== */
let tsession = null;

function startTest() {
  const learned = allCards().filter(c => state.srs[c.id]);
  const pool = learned.length >= 12 ? learned : allCards(); // 学習初期は全単語から
  const qs = shuffle(pool).slice(0, 20).map(card => {
    const roll = Math.random();
    const type = roll < 0.4 ? 'w2m' : roll < 0.8 ? 'm2w' : 'listen';
    const others = shuffle(allCards().filter(c =>
      c.lang === card.lang && c.id !== card.id && c.meaning !== card.meaning && c.word !== card.word
    )).slice(0, 3);
    return { card, choices: shuffle([card].concat(others)), type };
  });
  tsession = { qs, i: 0, correct: 0, wrong: [] };
  showStudyView();
  renderTestQ();
}

function renderTestQ() {
  const t = tsession;
  if (t.i >= t.qs.length) { finishTest(); return; }
  const q = t.qs[t.i];
  const card = q.card;
  let head;
  if (q.type === 'w2m') {
    head = `<div class="lang-tag">${LANG_NAME[card.lang]}</div><div class="word q">${esc(card.word)}</div>`;
  } else if (q.type === 'm2w') {
    head = `<div class="lang-tag">${LANG_NAME[card.lang]}</div><div class="word q">「${esc(card.meaning)}」は？</div>`;
  } else {
    head = `<div class="lang-tag">${LANG_NAME[card.lang]} — Listening</div><div class="word q">音声を聞いて意味を選んでください</div><button class="speak-btn" onclick="speak('${card.id}')">&#9654;</button>`;
  }
  document.getElementById('view-study').innerHTML =
    studyHeader('実力テスト', t.i + 1, t.qs.length) + `
    <div class="flashcard" style="min-height:180px;padding-bottom:26px">${head}</div>
    <div>${q.choices.map(c => `<button class="choice-btn" data-id="${c.id}" onclick="answerTest(this)">${esc(q.type === 'm2w' ? c.word : c.meaning)}</button>`).join('')}</div>`;
  if (q.type === 'listen') speak(card.id);
}

function answerTest(btn) {
  const t = tsession;
  const q = t.qs[t.i];
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.id === q.card.id) b.classList.add('correct');
  });
  const ok = btn.dataset.id === q.card.id;
  if (!ok) { btn.classList.add('wrong'); t.wrong.push(q.card); }
  else t.correct++;
  if (q.type !== 'listen') speak(q.card.id);
  setTimeout(() => { t.i++; renderTestQ(); }, ok ? 600 : 1500);
}

function finishTest() {
  const t = tsession;
  const total = t.qs.length;
  const pct = total ? Math.round(t.correct / total * 100) : 0;
  state.xp += 10;
  save();
  const comment = pct >= 90 ? '素晴らしい定着度です。' : pct >= 70 ? '良いペース。間違えた単語をもう一周。' : '繰り返しが力になります。すぐもう一度挑戦を。';
  document.getElementById('view-study').innerHTML = `
    <div class="done-card" style="padding-top:40px">
      <div class="ttl">Test Result</div>
      <p style="font-size:1.5rem;color:var(--primary);font-weight:300;margin-top:18px">${t.correct} / ${total}<span style="font-size:0.8rem;color:var(--sub)">（${pct}%）</span></p>
      <p>${comment}</p>
      ${t.wrong.length ? `<div style="text-align:left;margin-top:16px">
        <div class="legend">間違えた単語（タップで発音）</div>
        ${t.wrong.map(c => `<div class="word-item" onclick="speak('${c.id}')"><div><div class="w"><span class="lg">${c.lang.toUpperCase()}</span>${esc(c.word)}</div><div class="m">${esc(c.meaning)}</div></div></div>`).join('')}
      </div>` : ''}
      <div class="xp-gain">+ 10 XP</div>
      <div class="center-row">
        <button class="primary-btn" onclick="startTest()">もう一度テスト</button><br>
        <button class="ghost-btn" onclick="shareTestResult(${t.correct}, ${total})">LINEに結果を報告</button><br>
        <button class="ghost-btn" onclick="showView('home')">ホームへ</button>
      </div>
    </div>`;
  tsession = null;
}

function shareTestResult(correct, total) {
  const text = `📝 OPOYO Learning 実力テスト\nDay ${dayNumber()}/90 — ${correct}/${total}問正解（${Math.round(correct / total * 100)}%）\n🔥 ${state.streak}日連続`;
  if (navigator.share) navigator.share({ text }).catch(() => {});
  else location.href = 'https://line.me/R/share?text=' + encodeURIComponent(text);
}

/* =====================================================
   LINEに報告（AI秘書連携）
===================================================== */
function buildReportText() {
  const day = dayNumber();
  const log = todayLog();
  const goal = state.settings.cardsGoal;
  const done = [log.cards >= goal, log.g, log.r, log.s].filter(Boolean).length;
  const parts = [
    `📚 OPOYO Learning Day ${day}/90`,
    `タスク ${done}/4（単語${log.cards}枚 文法${log.g ? '✅' : '—'} 読解${log.r ? '✅' : '—'} 音読${log.s ? '✅' : '—'}）`,
    `🔥 ${state.streak}日連続`,
  ];
  const weak = allCards()
    .filter(c => state.srs[c.id] && state.srs[c.id].lapses >= 2)
    .sort((a, b) => state.srs[b.id].lapses - state.srs[a.id].lapses)
    .slice(0, 3)
    .map(c => c.word);
  if (weak.length) parts.push(`苦手: ${weak.join(' / ')}`);
  return parts.join('\n');
}
function reportToLine() {
  const text = buildReportText();
  if (navigator.share) {
    navigator.share({ text }).catch(() => {});
  } else {
    location.href = 'https://line.me/R/share?text=' + encodeURIComponent(text);
  }
}

/* =====================================================
   バックアップ
===================================================== */
async function exportData() {
  const data = JSON.stringify(state);
  try {
    await navigator.clipboard.writeText(data);
    toast('コピーしました。メモアプリ等に貼り付けて保管してください');
  } catch (e) {
    prompt('このテキストを全選択してコピーし、保管してください', data);
  }
}
function importData() {
  const t = prompt('バックアップのテキストを貼り付けてください');
  if (!t) return;
  try {
    const s = JSON.parse(t);
    if (!s.startDate || !s.srs) throw new Error('invalid');
    if (!confirm('現在のデータを上書きして復元します。よろしいですか？')) return;
    localStorage.setItem(KEY, JSON.stringify(s));
    location.reload();
  } catch (e) {
    toast('データの形式が正しくありません');
  }
}

/* =====================================================
   単語帳
===================================================== */
let wordFilter = { lang: 'all', cat: 'all' };

function renderWords() {
  const cards = allCards().filter(c =>
    (wordFilter.lang === 'all' || c.lang === wordFilter.lang) &&
    (wordFilter.cat === 'all' || c.cat === wordFilter.cat)
  );
  const cats = [...new Set(allCards()
    .filter(c => wordFilter.lang === 'all' || c.lang === wordFilter.lang)
    .map(c => c.cat))];

  const mark = c => {
    const r = state.srs[c.id];
    if (!r) return '<span style="color:var(--border)">○</span>';
    return r.box >= 3 ? '●' : '◐';
  };

  document.getElementById('view-words').innerHTML = `
    <div class="filter-row">
      ${[['all','すべて'],['en','English'],['id','Indonesia']].map(([v,l]) =>
        `<button class="chip ${wordFilter.lang===v?'on':''}" onclick="wordFilter.lang='${v}';wordFilter.cat='all';renderWords()">${l}</button>`).join('')}
    </div>
    <div class="filter-row sub">
      <button class="chip ${wordFilter.cat==='all'?'on':''}" onclick="wordFilter.cat='all';renderWords()">全カテゴリ</button>
      ${cats.map(c => `<button class="chip ${wordFilter.cat===c?'on':''}" onclick="wordFilter.cat='${esc(c)}';renderWords()">${esc(c)}</button>`).join('')}
    </div>

    <div class="legend">○ 未学習　◐ 学習中　● マスター　—　${cards.length}語　（タップで発音）</div>
    <div>
    ${cards.map(c => `
      <div class="word-item" onclick="speak('${c.id}')">
        <div><div class="w"><span class="lg">${c.lang.toUpperCase()}</span>${esc(c.word)}</div><div class="m">${esc(c.meaning)}</div></div>
        <div class="lvl">${mark(c)}</div>
      </div>`).join('')}
    </div>

    <div class="section add-form" style="border-bottom:none">
      <div class="section-title">Add Word</div>
      <select id="add-lang"><option value="en">English — 英語</option><option value="id">Indonesia — インドネシア語</option></select>
      <input id="add-word" placeholder="単語・フレーズ">
      <input id="add-meaning" placeholder="意味">
      <button class="primary-btn" onclick="addCustomWord()">追加する</button>
    </div>`;
}

function addCustomWord() {
  const lang = document.getElementById('add-lang').value;
  const word = document.getElementById('add-word').value.trim();
  const meaning = document.getElementById('add-meaning').value.trim();
  if (!word || !meaning) { toast('単語と意味の両方を入力してください'); return; }
  state.customSeq++;
  state.custom.push(['c' + state.customSeq, lang, word, meaning]);
  save();
  toast('追加しました');
  renderWords();
}

/* =====================================================
   記録
===================================================== */
function renderRecord() {
  const lv = level(state.xp);
  const cur = xpForLevel(lv), next = xpForLevel(lv + 1);
  const lvPct = Math.round((state.xp - cur) / (next - cur) * 100);
  const day = dayNumber();
  const week = Math.min(11, Math.floor((day - 1) / 7));
  const studiedDays = Object.keys(state.log).filter(d => state.log[d].cards > 0 || state.log[d].g || state.log[d].r || state.log[d].s).length;
  const gramDone = Math.min(state.gram.en.next, GRAMMAR.en.length) + Math.min(state.gram.id.next, GRAMMAR.id.length);

  const today = todayStr();
  const heatCells = Array.from({ length: 90 }, (_, i) => {
    const d = addDays(state.startDate, i);
    if (d > today) return '<span class="future"></span>';
    const l = state.log[d];
    if (!l || (!l.cards && !l.g && !l.r && !l.s)) return '<span></span>';
    const full = l.cards >= state.settings.cardsGoal && l.g && l.r && l.s;
    return `<span class="${full ? 'full' : 'part'}"></span>`;
  }).join('');

  document.getElementById('view-record').innerHTML = `
    <div class="section">
      <div class="section-title">Level ${lv}</div>
      <div class="hairbar" style="margin-top:0"><div style="width:${lvPct}%"></div></div>
      <div class="note">${state.xp} XP — 次のレベルまで ${next - state.xp} XP</div>
    </div>

    <div class="section">
      <div class="section-title">Stats</div>
      <div class="stat-grid">
        <div class="stat"><div class="v">${state.streak}</div><div class="k">連続日数</div></div>
        <div class="stat"><div class="v">${state.bestStreak}</div><div class="k">最長記録</div></div>
        <div class="stat"><div class="v">${perfectDays(state)}</div><div class="k">全タスク完了日</div></div>
        <div class="stat"><div class="v">${studiedDays}</div><div class="k">学習日数</div></div>
        <div class="stat"><div class="v">${masteredCount()}</div><div class="k">マスター単語</div></div>
        <div class="stat"><div class="v">${totalCards(state)}</div><div class="k">累計カード</div></div>
        <div class="stat"><div class="v">${gramDone}<span style="font-size:0.7rem;color:var(--sub)"> / ${GRAMMAR.en.length + GRAMMAR.id.length}</span></div><div class="k">文法レッスン</div></div>
        <div class="stat"><div class="v">${state.read.en + state.read.id}</div><div class="k">読んだ本文</div></div>
        <div class="stat"><div class="v">${Object.keys(state.srs).length}</div><div class="k">学習した単語</div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Heatmap <small>90 days</small></div>
      <div class="heat">${heatCells}</div>
      <div class="legend">薄い = 一部のタスク完了　濃い = 全タスク完了。マスを塗りつぶしていきましょう。</div>
    </div>

    <div class="section">
      <div class="section-title">Badges</div>
      <div class="badge-list">
        ${BADGES.map(([nm, fn]) => `<div class="badge ${fn(state) ? 'got' : ''}">${nm}</div>`).join('')}
      </div>
    </div>

    <div class="section">
      <div class="section-title">Roadmap <small>90 days — 12 weeks</small></div>
      ${ROADMAP.map((r, i) => `
        <div class="roadmap-item ${i === week ? 'now' : ''}">
          <span class="mo">第${i + 1}週</span>
          <span class="tx"><b>${r[0]}</b><small>${r[1]}</small></span>
        </div>`).join('')}
    </div>`;
}

/* =====================================================
   音声（TTS）
===================================================== */
let VOICES = [];
function refreshVoices() {
  if (window.speechSynthesis) VOICES = speechSynthesis.getVoices() || [];
}
if (window.speechSynthesis) {
  refreshVoices();
  speechSynthesis.onvoiceschanged = refreshVoices;
}
function pickVoice(lang) {
  if (!VOICES.length) refreshVoices();
  const targets = lang === 'en' ? ['en-us', 'en-gb', 'en'] : ['id-id', 'id', 'ms-my', 'ms'];
  for (const t of targets) {
    // ローカル音声を優先（品質が安定しやすい）
    const match = v => v.lang && v.lang.replace('_', '-').toLowerCase().startsWith(t);
    const v = VOICES.find(v => match(v) && v.localService) || VOICES.find(match);
    if (v) return v;
  }
  return null;
}
let idVoiceWarned = false;
function speakText(text, lang) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(String(text).replace(/\.\.\./g, ' ').replace(/[「」]/g, ''));
  const v = pickVoice(lang);
  if (v) u.voice = v;
  else if (lang === 'id' && !idVoiceWarned) {
    idVoiceWarned = true;
    toast('この端末にインドネシア語の音声がないため発音が不正確な場合があります');
  }
  u.lang = lang === 'en' ? 'en-US' : 'id-ID';
  u.rate = state.settings.rate || 0.95;
  u.pitch = 1;
  speechSynthesis.speak(u);
}
function speak(id) {
  const card = cardById(id);
  if (card) speakText(card.word, card.lang);
}

/* =====================================================
   ユーティリティ
===================================================== */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let toastTimer = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

save();
renderHome();

  navigator.serviceWorker.register('sw.js').catch(() => {});
}
