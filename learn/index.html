<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MIGNON LINGO — 英語 × インドネシア語 1年チャレンジ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #000033;
  --accent: #FF6B4A;
  --en: #2563EB;
  --id: #DC2626;
  --mix: #7C3AED;
  --bg: #FAF7F2;
  --card: #FFFFFF;
  --text: #333333;
  --sub: #999999;
  --border: #EEE8E0;
  --good: #16A34A;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter','Noto Sans JP',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
#app { max-width: 520px; margin: 0 auto; padding: 0 16px 90px; }

header { text-align: center; padding: 28px 0 6px; }
header h1 { font-weight: 300; letter-spacing: 0.35em; font-size: 0.95rem; color: var(--primary); text-transform: uppercase; }
header .tagline { font-size: 0.65rem; color: var(--sub); letter-spacing: 0.15em; margin-top: 6px; }

.view { display: none; }
.view.active { display: block; animation: fadein .25s ease; }
@keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ---- cards ---- */
.panel { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px; margin-top: 14px; box-shadow: 0 2px 8px rgba(0,0,51,0.04); }
.panel h2 { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.2em; color: var(--primary); margin-bottom: 12px; }

/* ---- day banner ---- */
.day-banner { display: flex; justify-content: space-between; align-items: center; }
.day-banner .big { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
.day-banner .big small { font-size: 0.8rem; font-weight: 400; color: var(--sub); }
.streak { text-align: right; }
.streak .flame { font-size: 1.4rem; }
.streak .num { font-size: 1.3rem; font-weight: 800; color: var(--accent); }
.streak .lbl { font-size: 0.6rem; color: var(--sub); letter-spacing: 0.1em; }
.yearbar { height: 8px; background: var(--border); border-radius: 4px; margin-top: 12px; overflow: hidden; }
.yearbar > div { height: 100%; background: linear-gradient(90deg, var(--en), var(--mix), var(--id)); border-radius: 4px; transition: width .5s; }
.theme-line { margin-top: 10px; font-size: 0.78rem; color: var(--text); }
.theme-line b { color: var(--mix); }

/* ---- goal ring ---- */
.goal-row { display: flex; align-items: center; gap: 16px; }
.ring { position: relative; width: 84px; height: 84px; flex-shrink: 0; }
.ring svg { transform: rotate(-90deg); }
.ring .pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1rem; color: var(--primary); }
.goal-info { font-size: 0.8rem; line-height: 1.7; }
.goal-info b { color: var(--accent); }

/* ---- language buttons ---- */
.lang-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; border: none; border-radius: 16px; padding: 16px 18px; margin-top: 10px; cursor: pointer; color: white; font-family: inherit; text-align: left; transition: transform .1s; }
.lang-btn:active { transform: scale(0.98); }
.lang-btn.en { background: linear-gradient(135deg, #2563EB, #1D4ED8); }
.lang-btn.id { background: linear-gradient(135deg, #DC2626, #B91C1C); }
.lang-btn.mix { background: linear-gradient(135deg, #7C3AED, #6D28D9); }
.lang-btn .name { font-size: 1rem; font-weight: 700; }
.lang-btn .name small { display: block; font-size: 0.65rem; font-weight: 300; opacity: 0.85; margin-top: 3px; }
.lang-btn .count { font-size: 0.7rem; background: rgba(255,255,255,0.2); padding: 6px 10px; border-radius: 10px; text-align: center; line-height: 1.5; }

/* ---- study ---- */
.study-top { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; font-size: 0.7rem; color: var(--sub); }
.study-top button { background: none; border: none; color: var(--sub); font-size: 0.7rem; cursor: pointer; letter-spacing: 0.1em; font-family: inherit; }
.qbar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 8px; overflow: hidden; }
.qbar > div { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }

.flashcard { background: var(--card); border: 1px solid var(--border); border-radius: 22px; padding: 40px 22px; margin-top: 16px; text-align: center; min-height: 280px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 4px 14px rgba(0,0,51,0.06); }
.flashcard .flag { font-size: 1.2rem; }
.flashcard .catg { font-size: 0.6rem; color: var(--sub); letter-spacing: 0.15em; margin-top: 4px; }
.flashcard .word { font-size: 1.7rem; font-weight: 800; color: var(--primary); margin: 18px 0 6px; line-height: 1.4; word-break: break-word; }
.flashcard .meaning { font-size: 1.15rem; color: var(--text); margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--border); line-height: 1.6; }
.flashcard .newtag { display: inline-block; font-size: 0.6rem; background: #FEF3C7; color: #B45309; border-radius: 8px; padding: 3px 10px; letter-spacing: 0.1em; margin: 0 auto; }
.speak-btn { background: none; border: 1px solid var(--border); border-radius: 50%; width: 44px; height: 44px; font-size: 1.1rem; cursor: pointer; margin: 14px auto 0; display: block; }

.btn-row { display: flex; gap: 10px; margin-top: 16px; }
.abtn { flex: 1; border: none; border-radius: 14px; padding: 16px 8px; font-size: 0.85rem; font-weight: 700; cursor: pointer; font-family: inherit; color: white; transition: transform .1s; }
.abtn:active { transform: scale(0.97); }
.abtn small { display: block; font-size: 0.6rem; font-weight: 300; margin-top: 3px; opacity: 0.85; }
.abtn.show { background: var(--primary); }
.abtn.again { background: #EF4444; }
.abtn.hard { background: #F59E0B; }
.abtn.good { background: var(--good); }

.choice-btn { display: block; width: 100%; background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 15px 16px; margin-top: 10px; font-size: 0.95rem; text-align: left; cursor: pointer; font-family: inherit; color: var(--text); transition: all .15s; }
.choice-btn:active { transform: scale(0.98); }
.choice-btn.correct { border-color: var(--good); background: #F0FDF4; color: var(--good); font-weight: 700; }
.choice-btn.wrong { border-color: #EF4444; background: #FEF2F2; color: #EF4444; }

.done-card { text-align: center; padding: 50px 20px; }
.done-card .emoji { font-size: 3rem; }
.done-card h3 { color: var(--primary); margin: 14px 0 8px; font-size: 1.1rem; }
.done-card p { font-size: 0.8rem; color: var(--sub); line-height: 1.8; }
.done-card .xp-gain { font-size: 1rem; color: var(--accent); font-weight: 800; margin-top: 10px; }
.primary-btn { background: var(--primary); color: white; border: none; border-radius: 14px; padding: 16px 30px; font-size: 0.8rem; letter-spacing: 0.2em; cursor: pointer; margin-top: 24px; font-family: inherit; font-weight: 600; }

/* ---- words view ---- */
.filter-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.chip { border: 1px solid var(--border); background: var(--card); border-radius: 20px; padding: 7px 14px; font-size: 0.72rem; cursor: pointer; font-family: inherit; color: var(--sub); }
.chip.on { background: var(--primary); color: white; border-color: var(--primary); }
.word-item { display: flex; justify-content: space-between; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-top: 8px; }
.word-item .w { font-weight: 700; font-size: 0.9rem; color: var(--primary); }
.word-item .m { font-size: 0.75rem; color: var(--sub); margin-top: 2px; }
.word-item .lvl { font-size: 0.85rem; flex-shrink: 0; margin-left: 10px; }
.add-form input, .add-form select { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 0.9rem; margin-top: 8px; font-family: inherit; background: var(--card); outline: none; }

/* ---- progress ---- */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.stat { background: var(--bg); border-radius: 14px; padding: 14px 8px; text-align: center; }
.stat .v { font-size: 1.25rem; font-weight: 800; color: var(--primary); }
.stat .k { font-size: 0.58rem; color: var(--sub); letter-spacing: 0.1em; margin-top: 4px; }
.levelbar { height: 10px; background: var(--border); border-radius: 5px; margin-top: 10px; overflow: hidden; }
.levelbar > div { height: 100%; background: linear-gradient(90deg, #F59E0B, var(--accent)); border-radius: 5px; }
.badge-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.badge { text-align: center; padding: 10px 4px; border-radius: 14px; background: var(--bg); opacity: 0.35; filter: grayscale(1); }
.badge.got { opacity: 1; filter: none; background: #FFF7ED; border: 1px solid #FED7AA; }
.badge .ico { font-size: 1.5rem; }
.badge .nm { font-size: 0.55rem; color: var(--text); margin-top: 5px; line-height: 1.4; }
.roadmap-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px dashed var(--border); font-size: 0.78rem; align-items: baseline; }
.roadmap-item:last-child { border-bottom: none; }
.roadmap-item .mo { font-weight: 800; color: var(--sub); flex-shrink: 0; width: 46px; }
.roadmap-item.now .mo { color: var(--accent); }
.roadmap-item.now .tx b { color: var(--accent); }
.roadmap-item .tx b { color: var(--primary); }
.roadmap-item .tx small { display: block; color: var(--sub); margin-top: 2px; }

/* ---- settings ---- */
.set-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; font-size: 0.82rem; }
.set-row select { border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; font-family: inherit; background: var(--card); font-size: 0.82rem; outline: none; }

/* ---- tabs ---- */
nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 8px 0 max(10px, env(safe-area-inset-bottom)); z-index: 100; }
nav button { background: none; border: none; font-family: inherit; font-size: 0.6rem; color: var(--sub); cursor: pointer; padding: 4px 16px; letter-spacing: 0.08em; }
nav button .ico { display: block; font-size: 1.25rem; margin-bottom: 3px; }
nav button.on { color: var(--primary); font-weight: 700; }

/* ---- confetti ---- */
.confetti { position: fixed; top: -30px; font-size: 1.3rem; z-index: 999; pointer-events: none; animation: fall linear forwards; }
@keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0.6; } }

.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 12px 22px; border-radius: 30px; font-size: 0.78rem; z-index: 500; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
</style>
</head>

/* =====================================================
   状態管理
===================================================== */
const KEY = 'mignon-lingo-v1';
let state = load();

function load() {
  try {
    const s = JSON.parse(localStorage.getItem(KEY));
    if (s && s.startDate) return s;
  } catch (e) {}
  return {
    startDate: todayStr(),
    xp: 0,
    streak: 0,
    bestStreak: 0,
    lastGoalDate: null,
    srs: {},           // id -> {box, due, reps, lapses}
    log: {},           // date -> {done, newEn, newId}
    custom: [],        // [id, lang, word, meaning]
    customSeq: 0,
    settings: { newPerDay: 5, dailyGoal: 20 },
  };
}
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

function todayStr(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function dayNumber() {
  const ms = new Date(todayStr()) - new Date(state.startDate);
  return Math.min(365, Math.floor(ms / 86400000) + 1);
}
function todayLog() {
  const t = todayStr();
  if (!state.log[t]) state.log[t] = { done: 0, newEn: 0, newId: 0 };
  return state.log[t];
}
function level(xp) { return Math.floor(Math.sqrt(xp / 60)) + 1; }
function xpForLevel(lv) { return (lv - 1) * (lv - 1) * 60; }
function totalDone(s) { return Object.values(s.log).reduce((a, d) => a + d.done, 0); }

/* 全カード（内蔵 + カスタム） */
function allCards() {
  const cards = [];
  EN_WORDS.forEach((w, i) => cards.push({ id: 'e' + i, lang: 'en', word: w[0], meaning: w[1], cat: w[2] }));
  ID_WORDS.forEach((w, i) => cards.push({ id: 'i' + i, lang: 'id', word: w[0], meaning: w[1], cat: w[2] }));
  state.custom.forEach(c => cards.push({ id: c[0], lang: c[1], word: c[2], meaning: c[3], cat: 'マイ単語' }));
  return cards;
}
function cardById(id) { return allCards().find(c => c.id === id); }
function masteredCount() {
  return Object.values(state.srs).filter(r => r.box >= 3).length;
}
function dueCards(lang) {
  const t = todayStr();
  return allCards().filter(c =>
    (lang === 'mix' || c.lang === lang) &&
    state.srs[c.id] && state.srs[c.id].due <= t
  );
}
function newCards(lang) {
  return allCards().filter(c =>
    (lang === 'mix' || c.lang === lang) && !state.srs[c.id]
  );
}
function newRemainingToday(lang) {
  const log = todayLog();
  const used = lang === 'en' ? log.newEn : log.newId;
  return Math.max(0, state.settings.newPerDay - used);
}

  if (name === 'home') renderHome();
  if (name === 'words') renderWords();

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* =====================================================
   学習セッション
===================================================== */
let session = null;

function startSession(lang) {
  const due = shuffle(dueCards(lang));
  let news = [];
  if (lang === 'mix') {
    news = shuffle(newCards('en')).slice(0, newRemainingToday('en'))
      .concat(shuffle(newCards('id')).slice(0, newRemainingToday('id')));
  } else {
    news = shuffle(newCards(lang)).slice(0, newRemainingToday(lang));
  }
  const queue = due.concat(shuffle(news));
  if (queue.length === 0) {
    toast('今日の分は完了！明日また復習カードが届きます 🌙');
    return;
  }
  session = { lang, queue, index: 0, total: queue.length, xpGain: 0, correct: 0, revealed: false };
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('on'));
  showStudyCard();
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-study').classList.add('active');
  window.scrollTo(0, 0);
}

function showStudyCard() {
  const v = document.getElementById('view-study');
  if (session.index >= session.queue.length) { finishSession(); return; }

  const card = session.queue[session.index];
  const rec = state.srs[card.id];
  const isNew = !rec;
  const flag = card.lang === 'en' ? '🇬🇧' : '🇮🇩';
  const progress = Math.round(session.index / session.queue.length * 100);
  // 2回以上正解しているカードは時々4択クイズに（楽しさ＆定着チェック）
  const asQuiz = rec && rec.reps >= 1 && Math.random() < 0.5;

  let cardHtml;
  if (asQuiz) {
    const pool = allCards().filter(c => c.lang === card.lang && c.id !== card.id);
    const choices = shuffle([card].concat(shuffle(pool).slice(0, 3)));
    cardHtml = `
      <div class="flashcard">
        <div class="flag">${flag} QUIZ</div>
        <div class="catg">${esc(card.cat)}</div>
        <div class="word" style="font-size:1.25rem">「${esc(card.meaning)}」は？</div>
      </div>
      ${choices.map(c => `<button class="choice-btn" data-id="${c.id}" onclick="answerQuiz(this,'${card.id}')">${esc(c.word)}</button>`).join('')}`;
  } else {
    cardHtml = `
      <div class="flashcard">
        ${isNew ? '<span class="newtag">✨ NEW</span>' : ''}
        <div class="flag">${flag}</div>
        <div class="catg">${esc(card.cat)}</div>
        <div class="word">${esc(card.word)}</div>
        <button class="speak-btn" onclick="speak('${card.id}')">🔊</button>
        <div class="meaning" id="meaning" style="visibility:hidden">${esc(card.meaning)}</div>
      </div>
      <div class="btn-row" id="answer-btns">
        <button class="abtn show" onclick="reveal()">答えを見る</button>
      </div>`;
  }

  v.innerHTML = `
    <div class="study-top">
      <span>${session.index + 1} / ${session.queue.length}枚</span>
      <button onclick="quitSession()">✕ 中断する</button>
    </div>
    <div class="qbar"><div style="width:${progress}%"></div></div>
    ${cardHtml}`;

  if (!asQuiz) speak(card.id);
  session.revealed = false;
}

function reveal() {
  if (session.revealed) return;
  session.revealed = true;
  document.getElementById('meaning').style.visibility = 'visible';
  document.getElementById('answer-btns').innerHTML = `
    <button class="abtn again" onclick="grade('again')">もう一度<small>すぐ再出題</small></button>
    <button class="abtn hard" onclick="grade('hard')">あいまい<small>明日また</small></button>
    <button class="abtn good" onclick="grade('good')">覚えた！<small>間隔をあける</small></button>`;
}

function answerQuiz(btn, correctId) {
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.id === correctId) b.classList.add('correct');
  });
  const ok = btn.dataset.id === correctId;
  if (!ok) btn.classList.add('wrong');
  speak(correctId);
  setTimeout(() => {
    if (ok) { session.xpGain += 3; session.correct++; grade('good', true); }
    else grade('again', true);
  }, ok ? 700 : 1400);
}

function grade(rating, silent) {
  const card = session.queue[session.index];
  const rec = state.srs[card.id] || { box: 0, due: todayStr(), reps: 0, lapses: 0 };
  const wasNew = !state.srs[card.id];

  if (rating === 'again') {
    rec.box = 1;
    rec.lapses++;
    rec.due = todayStr();
    // セッション内で数枚あとに再出題
    session.queue.splice(Math.min(session.index + 3, session.queue.length), 0, card);
  } else if (rating === 'hard') {
    rec.box = Math.max(1, rec.box);
    rec.due = todayStr(1);
  } else {
    rec.box = Math.min(INTERVALS.length - 1, rec.box + 1);
    rec.due = todayStr(INTERVALS[rec.box]);
    session.correct++;
  }
  rec.reps++;
  state.srs[card.id] = rec;

  const log = todayLog();
  log.done++;
  if (wasNew) { card.lang === 'en' ? log.newEn++ : log.newId++; }
  session.xpGain += 5;
  state.xp += rating === 'again' ? 2 : 5;

  checkGoalAndStreak();
  save();
  session.index++;
  if (!silent && Math.random() < 0.25) toast(CHEERS[Math.floor(Math.random() * CHEERS.length)]);
  showStudyCard();
}

function checkGoalAndStreak() {
  const t = todayStr();
  if (todayLog().done >= state.settings.dailyGoal && state.lastGoalDate !== t) {
    if (state.lastGoalDate === todayStr(-1)) state.streak++;
    else state.streak = 1;
    state.bestStreak = Math.max(state.bestStreak, state.streak);
    state.lastGoalDate = t;
    confetti();
    toast(`🔥 目標達成！${state.streak}日連続！`);
  }
}

function finishSession() {
  const acc = session.total ? Math.round(session.correct / session.total * 100) : 0;
  state.xp += 15; // セッション完了ボーナス
  save();
  confetti();
  document.getElementById('view-study').innerHTML = `
    <div class="panel done-card">
      <div class="emoji">🎉</div>
      <h3>セッション完了！</h3>
      <p>${session.total}枚のカードを学習しました<br>正答率 ${acc}%</p>
      <div class="xp-gain">+${session.xpGain + 15} XP</div>
      <button class="primary-btn" onclick="showView('home')">ホームへ戻る</button>
    </div>`;
  session = null;
}

function quitSession() {
  session = null;
  showView('home');
}

let wordFilter = { lang: 'all', cat: 'all' };

    (wordFilter.cat === 'all' || c.cat === wordFilter.cat)
  );

    .filter(c => wordFilter.lang === 'all' || c.lang === wordFilter.lang)
    .map(c => c.cat))];

  const stars = c => {
    const r = state.srs[c.id];

  };

      <button class="chip ${wordFilter.cat==='all'?'on':''}" onclick="wordFilter.cat='all';renderWords()">全カテゴリ</button>

    <p style="font-size:0.65rem;color:var(--sub);margin-top:14px">⚪未学習 🌱学習中 ⭐定着してきた 🌟マスター — ${cards.length}語</p>
    ${cards.map(c => `
      <div class="word-item" onclick="speak('${c.id}')">
        <div><div class="w">${c.lang==='en'?'🇬🇧':'🇮🇩'} ${esc(c.word)}</div><div class="m">${esc(c.meaning)}</div></div>
        <div class="lvl">${stars(c)}</div>
      </div>`).join('')}`;
}

function addCustomWord() {
  const lang = document.getElementById('add-lang').value;
  const word = document.getElementById('add-word').value.trim();
  const meaning = document.getElementById('add-meaning').value.trim();
  if (!word || !meaning) { toast('単語と意味の両方を入力してください'); return; }
  state.customSeq++;
  state.custom.push(['c' + state.customSeq, lang, word, meaning]);
  save();
  toast('追加しました！次の学習で出題されます ✨');
  renderWords();
}

/* =====================================================
   実績・進捗
===================================================== */
function renderProgress() {
  const lv = level(state.xp);
  const cur = xpForLevel(lv), next = xpForLevel(lv + 1);
  const lvPct = Math.round((state.xp - cur) / (next - cur) * 100);
  const day = dayNumber();
  const month = Math.min(11, Math.floor((day - 1) / 30.5));
  const studiedDays = Object.keys(state.log).filter(d => state.log[d].done > 0).length;
  const started = Object.keys(state.srs).length;

  document.getElementById('view-progress').innerHTML = `
    <div class="panel">
      <h2>LEVEL ${lv}</h2>
      <div class="levelbar"><div style="width:${lvPct}%"></div></div>
      <p style="font-size:0.68rem;color:var(--sub);margin-top:8px">${state.xp} XP — 次のレベルまであと ${next - state.xp} XP</p>
    </div>

    <div class="panel">
      <h2>STATS</h2>
      <div class="stat-grid">
        <div class="stat"><div class="v">🔥${state.streak}</div><div class="k">連続日数</div></div>
        <div class="stat"><div class="v">${state.bestStreak}</div><div class="k">最長記録</div></div>
        <div class="stat"><div class="v">${studiedDays}</div><div class="k">学習日数</div></div>
        <div class="stat"><div class="v">${started}</div><div class="k">学習した単語</div></div>
        <div class="stat"><div class="v">${masteredCount()}</div><div class="k">マスター単語</div></div>
        <div class="stat"><div class="v">${totalDone(state)}</div><div class="k">累計カード</div></div>
      </div>
    </div>

    <div class="panel">
      <h2>BADGES</h2>
      <div class="badge-grid">
        ${BADGES.map(([ico, nm, fn]) => `
          <div class="badge ${fn(state) ? 'got' : ''}"><div class="ico">${ico}</div><div class="nm">${nm}</div></div>`).join('')}
      </div>
    </div>

    <div class="panel">
      <h2>1年間ロードマップ</h2>
      ${ROADMAP.map((r, i) => `
        <div class="roadmap-item ${i === month ? 'now' : ''}">
          <span class="mo">${i + 1}ヶ月目${i === month ? ' 📍' : ''}</span>
          <span class="tx"><b>${r[0]}</b><small>${r[1]}</small></span>
        </div>`).join('')}
    </div>`;
}

/* =====================================================
   ユーティリティ
===================================================== */
function speak(id) {
  const card = cardById(id);
  if (!card || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(card.word.replace(/\.\.\./g, ''));
  u.lang = card.lang === 'en' ? 'en-US' : 'id-ID';
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let toastTimer = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function confetti() {
  const emojis = ['🎉','✨','🌟','🎊','💛','🧡'];
  for (let i = 0; i < 36; i++) {
    const el = document.createElement('span');
    el.className = 'confetti';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (1.6 + Math.random() * 1.6) + 's';
    el.style.animationDelay = Math.random() * 0.4 + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

/* 起動 */
save();
renderHome();
</script>
