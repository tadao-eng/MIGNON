<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIGNON SALES</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: #FFF; color: #333; text-align: center; }
        #debug-header { padding: 40px 20px; border-bottom: 1px solid #EEE; }
        .logo { font-weight: 300; letter-spacing: 0.3em; font-size: 1.2rem; color: #000033; }
        
        #auth-section { padding: 60px 20px; }
        #main-section { display: none; padding: 20px; }
        #main-section.active { display: block; }

        /* 入力フォームの簡易スタイル */
        .card { max-width: 450px; margin: 0 auto; border: 1px solid #EEE; padding: 30px 20px; text-align: left; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #EEE; font-size: 1.1rem; outline: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { width: 100%; padding: 20px; background: #000033; color: #FFF; border: none; margin-top: 20px; font-weight: bold; letter-spacing: 0.1em; }
        
        .sheet-link { margin-top: 40px; display: block; color: #AAA; font-size: 0.7rem; text-decoration: none; }
    </style>
</head>
<body>

    <div id="debug-header">
        <div class="logo">MIGNON SALES</div>
        <div id="status-msg" style="font-size: 0.7rem; color: #999; margin-top: 10px;">システムを読み込み中...</div>
    </div>

    <!-- ログインエリア -->
    <div id="auth-section">
        <div id="g_id_onload" data-client_id="957188073085-nbfrt00q79l9htk641kmpqt9mm3u9jc3.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signin_with" data-shape="rectangular" data-logo_alignment="left"></div>
    </div>

    <!-- メイン入力エリア -->
    <div id="main-section">
        <div class="card">
            <div class="input-group"><label>日付</label><input type="date" id="date"></div>
            <div style="font-size:0.7rem; font-weight:bold; margin-bottom:10px;">現金 / CASH</div>
            <div class="grid">
                <div class="input-group"><label>10%</label><input type="number" id="cash10" placeholder="0"></div>
                <div class="input-group"><label>8%</label><input type="number" id="cash8" placeholder="0"></div>
            </div>
            <div style="font-size:0.7rem; font-weight:bold; margin-bottom:10px;">エアペイ / AIRPAY</div>
            <div class="grid">
                <div class="input-group"><label>10%</label><input type="number" id="air10" placeholder="0"></div>
                <div class="input-group"><label>8%</label><input type="number" id="air8" placeholder="0"></div>
            </div>
            <div style="font-size:0.7rem; font-weight:bold; margin-bottom:10px;">ペイペイ / PAYPAY</div>
            <div class="grid">
                <div class="input-group"><label>10%</label><input type="number" id="pay10" placeholder="0"></div>
                <div class="input-group"><label>8%</label><input type="number" id="pay8" placeholder="0"></div>
            </div>
            <div class="input-group"><label>備考</label><input type="text" id="memo" placeholder="..."></div>
            <button id="submitBtn" onclick="submitForm()">RECORD SALES</button>
        </div>
        <a href="https://docs.google.com/spreadsheets/d/1ATvjvDZnHracvfG5CnHocNo8rBY99Lky1bSgtP7X4G0/edit" target="_blank" class="sheet-link">VIEW SPREADSHEET</a>
    </div>

    <script>
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwkB7TGV0crBg-74xof-Pcwe5GR4IO5hWimQ-r_CTdZBaLLizjMEutU2U1mZtGJDEFa8w/exec';
        const ALLOWED_USERS = ["tadaowakahoi@gmail.com", "meron87328732@gmail.com"];
        let ID_TOKEN = null;

        document.getElementById('status-msg').innerText = 'ログインをお待ちしています';
        document.getElementById('date').valueAsDate = new Date();

        function handleCredentialResponse(response) {
            try {
                ID_TOKEN = response.credential;
                // トークンの解析（超シンプル版）
                const base64Url = ID_TOKEN.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const userData = JSON.parse(decodeURIComponent(escape(window.atob(base64))));
                
                if (ALLOWED_USERS.includes(userData.email)) {
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('main-section').classList.add('active');
                    document.getElementById('status-msg').innerText = 'ログイン中: ' + userData.email;
                } else {
                    alert('権限がありません: ' + userData.email);
                    location.reload();
                }
            } catch (e) {
                alert('エラーが発生しました: ' + e.message);
            }
        }

        async function submitForm() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = '送信中...';

            const data = {
                idToken: ID_TOKEN,
                date: document.getElementById('date').value,
                cash10: Number(document.getElementById('cash10').value || 0),
                cash8: Number(document.getElementById('cash8').value || 0),
                air10: Number(document.getElementById('air10').value || 0),
                air8: Number(document.getElementById('air8').value || 0),
                pay10: Number(document.getElementById('pay10').value || 0),
                pay8: Number(document.getElementById('pay8').value || 0),
                memo: document.getElementById('memo').value
            };

            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify(data),
                    headers: { 'Content-Type': 'text/plain' }
                });
                const result = await response.json();
                if (result.success) {
                    alert('登録が完了しました！');
                    location.reload();
                } else {
                    alert('エラー: ' + result.message);
                }
            } catch (e) {
                alert('通信エラー: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'RECORD SALES';
            }
        }
    </script>
</body>
</html>
