<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIGNON SALES ENTRY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --primary: #000033;
            --bg: #FFFFFF;
            --text: #333333;
            --border: #E5E5E5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* 認証画面 */
        #auth-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #auth-container.hidden { display: none; }

        .auth-logo {
            font-weight: 300;
            letter-spacing: 0.3em;
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* メインコンテンツ */
        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            display: none;
        }

        .container.active { display: block; }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 0.15em;
            font-size: 1.1rem;
            color: var(--primary);
            margin: 0;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: #999;
            margin-top: 10px;
        }

        .form-card {
            background: white;
            padding: 40px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        label {
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
        }

        input {
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 10px 0;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
            background: transparent;
            border-radius: 0;
            font-weight: 300;
        }

        input:focus { border-bottom-color: var(--primary); }

        .section-title {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: var(--primary);
            border-left: 2px solid var(--primary);
            padding-left: 10px;
            margin-bottom: -15px;
        }

        .submit-btn {
            margin-top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: opacity 0.3s;
            font-weight: 600;
        }

        .submit-btn:disabled { opacity: 0.5; }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,51,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 2000;
            text-align: center;
        }

        .overlay.active { display: flex; }

        .loader {
            width: 20px; height: 20px;
            border: 2px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- 認証レイヤー -->
    <div id="auth-container">
        <div class="auth-logo">MIGNON SALES</div>
        <div id="g_id_onload"
             data-client_id="957188073085-nbfrt00q79l9htk641kmpqt9mm3u9jc3.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signin_with" data-shape="rectangular" data-logo_alignment="left"></div>
    </div>

    <!-- メイン画面 -->
    <div class="container" id="main-container">
        <header>
            <h1>売上入力</h1>
            <div class="subtitle">PREMIUM SALES RECORD SYSTEM</div>
        </header>

        <div class="form-card">
            <div class="input-group">
                <label>日付 / DATE</label>
                <input type="date" id="date" required>
            </div>

            <div class="section-title">現金 / CASH</div>
            <div class="grid-2">
                <div class="input-group">
                    <label>10%</label>
                    <input type="number" id="cash10" placeholder="0" inputmode="numeric">
                </div>
                <div class="input-group">
                    <label>8%</label>
                    <input type="number" id="cash8" placeholder="0" inputmode="numeric">
                </div>
            </div>

            <div class="section-title">エアペイ / AIRPAY</div>
            <div class="grid-2">
                <div class="input-group">
                    <label>10%</label>
                    <input type="number" id="air10" placeholder="0" inputmode="numeric">
                </div>
                <div class="input-group">
                    <label>8%</label>
                    <input type="number" id="air8" placeholder="0" inputmode="numeric">
                </div>
            </div>

            <div class="section-title">ペイペイ / PAYPAY</div>
            <div class="grid-2">
                <div class="input-group">
                    <label>10%</label>
                    <input type="number" id="pay10" placeholder="0" inputmode="numeric">
                </div>
                <div class="input-group">
                    <label>8%</label>
                    <input type="number" id="pay8" placeholder="0" inputmode="numeric">
                </div>
            </div>

            <div class="input-group">
                <label>備考 / MEMO</label>
                <input type="text" id="memo" placeholder="...">
            </div>

            <button id="submitBtn" class="submit-btn" onclick="submitForm()">RECORD SALES</button>
        </div>
    </div>

    <div id="overlay" class="overlay">
        <div>
            <div id="loader" class="loader"></div>
            <span id="msgText">送信中...</span>
        </div>
    </div>

    <script>
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwkB7TGV0crBg-74xof-Pcwe5GR4IO5hWimQ-r_CTdZBaLLizjMEutU2U1mZtGJDEFa8w/exec';
        let ID_TOKEN = null;

        document.getElementById('date').valueAsDate = new Date();

        function handleCredentialResponse(response) {
            ID_TOKEN = response.credential;
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('main-container').classList.add('active');
        }

        async function submitForm() {
            const data = {
                idToken: ID_TOKEN,
                date: document.getElementById('date').value,
                cash10: Number(document.getElementById('cash10').value || 0),
                cash8: Number(document.getElementById('cash8').value || 0),
                air10: Number(document.getElementById('air10').value || 0),
                air8: Number(document.getElementById('air8').value || 0),
                pay10: Number(document.getElementById('pay10').value || 0),
                pay8: Number(document.getElementById('pay8').value || 0),
                memo: document.getElementById('memo').value
            };

            const btn = document.getElementById('submitBtn');
            const overlay = document.getElementById('overlay');
            const msgText = document.getElementById('msgText');

            btn.disabled = true;
            overlay.classList.add('active');
            msgText.innerText = '送信中...';

            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    body: JSON.stringify(data),
                    headers: { 'Content-Type': 'text/plain' }
                });
                const result = await response.json();
                
                if (result.success) {
                    msgText.innerText = '記録完了';
                    setTimeout(() => {
                        overlay.classList.remove('active');
                        btn.disabled = false;
                        ['cash10', 'cash8', 'air10', 'air8', 'pay10', 'pay8', 'memo'].forEach(id => {
                            document.getElementById(id).value = '';
                        });
                    }, 2000);
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                alert('エラー: ' + error.message);
                overlay.classList.remove('active');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
