<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIGNON SALES ENTRY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #000033; --bg: #FFFFFF; --text: #333333; --border: #E5E5E5; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; padding: 120px 20px 40px; width: 100%; }
        h1 { font-weight: 300; letter-spacing: 0.35em; font-size: 1rem; color: var(--primary); text-transform: uppercase; }
        
        #auth-section { padding: 40px 20px; text-align: center; }
        .login-label { font-size: 0.7rem; letter-spacing: 0.4em; color: #999; margin-bottom: 25px; font-weight: 400; text-transform: uppercase; }

        #main-section { width: 100%; max-width: 500px; padding: 0 15px 60px; display: none; }
        #main-section.active { display: block; }
        
        .form-card { background: white; padding: 10px 20px; display: flex; flex-direction: column; gap: 30px; width: 100%; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        /* ラベルのスタイル調整：(店内飲食) などの補足を少し小さく */
        label { font-size: 0.65rem; color: #AAA; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        label span { font-size: 0.55rem; font-weight: 400; opacity: 0.8; }

        input { border: none; border-bottom: 1px solid var(--border); padding: 10px 0; font-size: 1.2rem; outline: none; background: transparent; border-radius: 0; font-weight: 300; width: 100%; }
        .section-title { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.15em; color: var(--primary); border-left: 2px solid var(--primary); padding-left: 10px; margin-bottom: -15px; }
        .submit-btn { margin-top: 30px; background: var(--primary); color: white; border: none; padding: 22px; font-size: 0.85rem; letter-spacing: 0.3em; cursor: pointer; font-weight: 600; width: 100%; }
        
        .sheet-link-container { margin-top: 100px; text-align: center; }
        .sheet-link { display: inline-block; padding: 10px 20px; color: #CCC; text-decoration: none; font-size: 0.7rem; letter-spacing: 0.2em; transition: all 0.3s; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; font-size: 0.8rem; color: var(--primary); letter-spacing: 0.2em; }
        .overlay.active { display: flex; }
    </style>
</head>
<body>
    <header><h1>MIGNON SALES ENTRY</h1></header>

    <div id="auth-section">
        <div class="login-label">LOGIN</div>
        <div id="g_id_onload" data-client_id="957188073085-nbfrt00q79l9htk641kmpqt9mm3u9jc3.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_select="true"></div>
        <div class="g_id_signin" data-type="standard" data-size="medium" data-theme="outline" data-text="signin" data-shape="rectangular" data-logo_alignment="left"></div>
        <div class="sheet-link-container">
            <a href="https://docs.google.com/spreadsheets/d/1ATvjvDZnHracvfG5CnHocNo8rBY99Lky1bSgtP7X4G0/edit" target="_blank" class="sheet-link">VIEW SPREADSHEET</a>
        </div>
    </div>

    <div id="main-section">
        <div class="form-card">
            <div class="input-group"><label>Date</label><input type="date" id="date" required></div>
            
            <div class="section-title">CASH</div>
            <div class="grid-2">
                <div class="input-group"><label>10% <span>(店内飲食)</span></label><input type="number" id="cash10" class="entry-field" placeholder="0" inputmode="numeric"></div>
                <div class="input-group"><label>8% <span>(テイクアウト等)</span></label><input type="number" id="cash8" class="entry-field" placeholder="0" inputmode="numeric"></div>
            </div>

            <div class="section-title">AIRPAY</div>
            <div class="grid-2">
                <div class="input-group"><label>10% <span>(店内飲食)</span></label><input type="number" id="air10" class="entry-field" placeholder="0" inputmode="numeric"></div>
                <div class="input-group"><label>8% <span>(テイクアウト等)</span></label><input type="number" id="air8" class="entry-field" placeholder="0" inputmode="numeric"></div>
            </div>

            <div class="section-title">PAYPAY</div>
            <div class="grid-2">
                <div class="input-group"><label>10% <span>(店内飲食)</span></label><input type="number" id="pay10" class="entry-field" placeholder="0" inputmode="numeric"></div>
                <div class="input-group"><label>8% <span>(テイクアウト等)</span></label><input type="number" id="pay8" class="entry-field" placeholder="0" inputmode="numeric"></div>
            </div>

            <div class="input-group"><label>Memo</label><input type="text" id="memo" class="entry-field" placeholder="..."></div>
            <button id="submitBtn" class="submit-btn" onclick="submitForm()">RECORD SALES</button>
        </div>
        <div class="sheet-link-container">
            <a href="https://docs.google.com/spreadsheets/d/1ATvjvDZnHracvfG5CnHocNo8rBY99Lky1bSgtP7X4G0/edit" target="_blank" class="sheet-link">VIEW SPREADSHEET</a>
        </div>
    </div>

    <div id="overlay" class="overlay">RECORDING...</div>

    <script>
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwkB7TGV0crBg-74xof-Pcwe5GR4IO5hWimQ-r_CTdZBaLLizjMEutU2U1mZtGJDEFa8w/exec';
        const ALLOWED_USERS = ["tadaowakahoi@gmail.com", "meron87328732@gmail.com"];
        let ID_TOKEN = null;
        document.getElementById('date').valueAsDate = new Date();

        function handleCredentialResponse(response) {
            try {
                ID_TOKEN = response.credential;
                const userData = JSON.parse(decodeURIComponent(escape(window.atob(ID_TOKEN.split('.')[1]))));
                if (ALLOWED_USERS.includes(userData.email)) {
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('main-section').classList.add('active');
                } else { alert('Access Denied'); location.reload(); }
            } catch (e) { alert('Auth Error'); }
        }

        async function submitForm() {
            if (!ID_TOKEN) { location.reload(); return; }
            const data = { idToken: ID_TOKEN, date: document.getElementById('date').value, cash10: Number(document.getElementById('cash10').value || 0), cash8: Number(document.getElementById('cash8').value || 0), air10: Number(document.getElementById('air10').value || 0), air8: Number(document.getElementById('air8').value || 0), pay10: Number(document.getElementById('pay10').value || 0), pay8: Number(document.getElementById('pay8').value || 0), memo: document.getElementById('memo').value };
            const btn = document.getElementById('submitBtn');
            const overlay = document.getElementById('overlay');
            btn.disabled = true; overlay.classList.add('active');
            try {
                const response = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify(data), headers: { 'Content-Type': 'text/plain' } });
                const result = await response.json();
                if (result.success) {
                    alert('Success');
                    document.querySelectorAll('.entry-field').forEach(field => field.value = '');
                } else { alert('Error: ' + result.message); }
            } catch (error) { alert('Network Error'); } finally { overlay.classList.remove('active'); btn.disabled = false; }
        }
    </script>
</body>
</html>
