<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIGNON SALES</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary: #000033; --bg: #FFFFFF; --text: #333333; --border: #E5E5E5; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; }

        /* ヘッダー：常に表示 */
        header { text-align: center; padding: 40px 20px; width: 100%; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        h1 { font-weight: 300; letter-spacing: 0.15em; font-size: 1.2rem; color: var(--primary); text-transform: uppercase; }
        .subtitle { font-size: 0.65rem; letter-spacing: 0.1em; color: #999; margin-top: 8px; }

        /* ログインエリア */
        #auth-section { padding: 80px 20px; text-align: center; }
        .login-msg { font-size: 0.8rem; color: #666; margin-bottom: 30px; letter-spacing: 0.05em; }

        /* メイン入力エリア（最初は非表示） */
        #main-section { width: 100%; max-width: 500px; padding: 0 15px 40px; display: none; }
        #main-section.active { display: block; }

        .form-card { background: white; padding: 25px 20px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 25px; width: 100%; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { font-size: 0.7rem; color: #888; font-weight: 600; text-transform: uppercase; }
        input { border: none; border-bottom: 1px solid var(--border); padding: 12px 0; font-size: 1.2rem; outline: none; background: transparent; border-radius: 0; font-weight: 300; width: 100%; }
        input:focus { border-bottom-color: var(--primary); }
        .section-title { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; color: var(--primary); border-left: 3px solid var(--primary); padding-left: 10px; margin-bottom: -10px; margin-top: 5px; }
        
        .submit-btn { margin-top: 15px; background: var(--primary); color: white; border: none; padding: 20px; font-size: 0.9rem; letter-spacing: 0.2em; cursor: pointer; font-weight: 600; width: 100%; }
        .submit-btn:disabled { opacity: 0.5; }
        
        .sheet-link-container { margin-top: 30px; text-align: center; padding-bottom: 20px; }
        .sheet-link { font-size: 0.7rem; color: #AAA; text-decoration: none; border-bottom: 1px solid #EEE; padding-bottom: 2px; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,51,0.95); display: none; justify-content: center; align-items: center; color: white; z-index: 2000; }
        .overlay.active { display: flex; }
    </style>
</head>
<body>

    <header>
        <h1>売上入力</h1>
        <div class="subtitle">PREMIUM SALES RECORD SYSTEM</div>
    </header>

    <!-- ログインエリア -->
    <div id="auth-section">
        <p class="login-msg">アクセスするにはログインしてください</p>
        <div id="g_id_onload" data-client_id="957188073085-nbfrt00q79l9htk641kmpqt9mm3u9jc3.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signin_with" data-shape="rectangular" data-logo_alignment="left"></div>
    </div>

    <!-- メイン画面 -->
    <div id="main-section">
        <div class="form-card">
            <div class="input-group"><label>日付 / DATE</label><input type="date" id="date" required></div>
            <div class="section-title">現金 / CASH</div>
            <div class="grid-2">
                <div class="input-group"><label>10%</label><input type="number" id="cash10" placeholder="0" inputmode="numeric"></div>
                <div class="input-group"><label>8%</label><input type="number" id="cash8" placeholder="0" inputmode="numeric"></div>
            </div>
            <div class="section-title">エアペイ / AIRPAY</div>
            <div class="grid-2">
                <div class="input-group"><label>10%</label><input type="number" id="air10" placeholder="0" inputmode="numeric"></div>
                <div class="input-group"><label>8%</label><input type="number" id="air8" placeholder="0" inputmode="numeric"></div>
            </div>
            <div class="section-title">ペイペイ / PAYPAY</div>
            <div class="grid-2">
                <div class="input-group"><label>10%</label><input type="number" id="pay10" placeholder="0" inputmode="numeric"></div>
                <div class="input-group"><label>8%</label><input type="number" id="pay8" placeholder="0" inputmode="numeric"></div>
            </div>
            <div class="input-group"><label>備考 / MEMO</label><input type="text" id="memo" placeholder="..."></div>
            <button id="submitBtn" class="submit-btn" onclick="submitForm()">RECORD SALES</button>
        </div>
        <div class="sheet-link-container">
            <a href="https://docs.google.com/spreadsheets/d/1ATvjvDZnHracvfG5CnHocNo8rBY99Lky1bSgtP7X4G0/edit" target="_blank" class="sheet-link">VIEW SPREADSHEET</a>
        </div>
    </div>

    <div id="overlay" class="overlay">
        <div style="text-align:center;">
            <p>送信中...</p>
        </div>
    </div>

    <script>
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwkB7TGV0crBg-74xof-Pcwe5GR4IO5hWimQ-r_CTdZBaLLizjMEutU2U1mZtGJDEFa8w/exec';
        const ALLOWED_USERS = ["tadaowakahoi@gmail.com", "meron87328732@gmail.com"];
        let ID_TOKEN = null;

        document.getElementById('date').valueAsDate = new Date();

        function handleCredentialResponse(response) {
            try {
                ID_TOKEN = response.credential;
                const base64Url = ID_TOKEN.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const userData = JSON.parse(decodeURIComponent(escape(window.atob(base64))));
                
                if (ALLOWED_USERS.includes(userData.email)) {
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('main-section').classList.add('active');
                } else {
                    alert('権限がありません：' + userData.email);
                    location.reload();
                }
            } catch (e) {
                alert('認証エラーが発生しました。');
            }
        }

        async function submitForm() {
            if (!ID_TOKEN) { alert('認証切れです'); location.reload(); return; }
            const data = {
                idToken: ID_TOKEN,
                date: document.getElementById('date').value,
                cash10: Number(document.getElementById('cash10').value || 0),
                cash8: Number(document.getElementById('cash8').value || 0),
                air10: Number(document.getElementById('air10').value || 0),
                air8: Number(document.getElementById('air8').value || 0),
                pay10: Number(document.getElementById('pay10').value || 0),
                pay8: Number(document.getElementById('pay8').value || 0),
                memo: document.getElementById('memo').value
            };

            const btn = document.getElementById('submitBtn');
            const overlay = document.getElementById('overlay');
            btn.disabled = true;
            overlay.classList.add('active');

            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    body: JSON.stringify(data),
                    headers: { 'Content-Type': 'text/plain' }
                });
                const result = await response.json();
                if (result.success) {
                    alert('登録完了しました');
                    location.reload();
                } else {
                    alert('エラー: ' + result.message);
                }
            } catch (error) {
                alert('通信エラー: ' + error.message);
            } finally {
                overlay.classList.remove('active');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
